# electron-builder configuration for Eldoria
appId: com.eldoria.rpg
productName: Eldoria
copyright: Copyright © 2026

directories:
  output: dist-electron
  buildResources: build

# Files to include in the Electron package
files:
  - electron/**/*
  - "!**/node_modules/**/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/.cache/**"

# Extra resources copied next to the app (not inside ASAR)
# The build script already copies public/ into .next/standalone/public,
# so we only need to ship the standalone directory as-is.
extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
      - "!**/node_modules/.cache/**"

# Safety net: ensure Prisma native binaries are accessible outside ASAR
# (most Prisma files live in extraResources/standalone, but this catches any
# that might end up in the main app bundle)
asarUnpack:
  - "**/node_modules/.prisma/**"
  - "**/node_modules/@prisma/**"

# ─── Publish config (GitHub Releases) ────────────────
publish:
  provider: github
  owner: DmzGamingYT
  repo: Eldoria
  releaseType: release

# ─── Windows ─────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "Eldoria-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Eldoria

# ─── macOS ────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  category: public.app-category.games
  artifactName: "Eldoria-${version}-mac-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

# ─── Linux ────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  icon: build/icons
  category: Game
  artifactName: "Eldoria-${version}-linux-${arch}.${ext}"

# Override .deb naming to follow Debian convention (name_version_arch.deb)
# electron-builder maps ${arch} x64 → amd64 in the deb context.
deb:
  artifactName: "${name}_${version}_${arch}.deb"

# Override .rpm naming to keep consistent "x64" in the filename.
# NOTE: ${arch} in rpm context maps x64 → x86_64, which would break our
# download links. Hardcode "x64" and use productName for capital "Eldoria".
rpm:
  artifactName: "Eldoria-${version}-linux-x64.rpm"
