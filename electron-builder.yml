# electron-builder configuration for Eldoria
appId: com.eldoria.rpg
productName: Eldoria
copyright: Copyright © 2026

directories:
  output: dist-electron
  buildResources: build

# Files to include in the Electron package.
# We bundle .next/standalone INSIDE app.asar to avoid the Windows MAX_PATH
# (260 char) corruption that occurs when NSIS extracts deeply nested
# node_modules as loose files via extraResources — the overflow corrupts
# folder names into garbled CJK characters (e.g. "肊").
files:
  - electron/**/*
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
      - "!**/node_modules/.cache/**"
  - "!**/node_modules/**/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/.cache/**"

# Native binaries MUST be unpacked from the ASAR (they cannot be loaded
# from inside an archive). This extracts them to app.asar.unpacked/.
# Electron resolves require() for .node files to the unpacked copy
# automatically.
asarUnpack:
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"

# ─── Publish config (GitHub Releases) ────────────────
publish:
  provider: github
  owner: DmzGamingYT
  repo: Eldoria
  releaseType: release

# ─── Windows ─────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: "Eldoria-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Eldoria
  # Force Unicode NSIS to preserve non-ASCII characters (accents, CJK, etc.)
  # in file/folder names during extraction. Without this, NSIS may use the
  # system codepage (e.g. cp1252 on Western Windows) which corrupts UTF-8
  # names into garbled characters.
  unicode: true

# ─── macOS ────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  category: public.app-category.games
  artifactName: "Eldoria-${version}-mac-${arch}.${ext}"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

# ─── Linux ────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  icon: build/icons
  category: Game
  artifactName: "Eldoria-${version}-linux-${arch}.${ext}"

# Override .deb naming to follow Debian convention (name_version_arch.deb)
# electron-builder maps ${arch} x64 → amd64 in the deb context.
deb:
  artifactName: "${name}_${version}_${arch}.deb"

# Override .rpm naming to keep consistent "x64" in the filename.
# NOTE: ${arch} in rpm context maps x64 → x86_64, which would break our
# download links. Hardcode "x64" and use productName for capital "Eldoria".
rpm:
  artifactName: "Eldoria-${version}-linux-x64.rpm"
