name: 🐛 Rapport de bug
description: Signaler un bug ou un problème dans le jeu Eldoria
title: "[Bug] "
labels: ["bug", "à vérifier"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de signaler les bugs que vous rencontrez dans **Eldoria** !
        Plus vous donnez de détails, plus nous pourrons résoudre le problème rapidement.

  - type: textarea
    id: description
    attributes:
      label: 📝 Description du bug
      description: Décrivez clairement ce qui ne fonctionne pas.
      placeholder: "Quand je..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🪜 Étapes pour reproduire
      description: Comment pouvons-nous reproduire ce problème ?
      placeholder: |
        1. Aller dans '...'
        2. Cliquer sur '...'
        3. Observer l'erreur '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Comportement attendu
      description: Que devrait-il se passer normalement ?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 📸 Captures d'écran
      description: Si possible, ajoutez des captures d'écran pour illustrer le problème.

  - type: dropdown
    id: environment
    attributes:
      label: 🖥️ Environnement
      description: Sur quelle plateforme jouez-vous ?
      options:
        - Navigateur (Chrome / Firefox / Safari / Edge)
        - Application Desktop (Electron) — macOS
        - Application Desktop (Electron) — Windows
        - Application Desktop (Electron) — Linux
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: 🌐 Navigateur / Version
      placeholder: "ex: Chrome 125, Firefox 128, Electron 42..."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 📋 Journaux de la console
      description: Si vous voyez des erreurs dans la console du navigateur (F12), collez-les ici.
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: 🔴 Gravité
      description: À quel point le problème impacte-t-il l'expérience ?
      options:
        - Faible — Gênant mais jouable
        - Moyen — Impacte le gameplay
        - Critique — Le jeu ne fonctionne plus
        - Bloquant — Crash ou impossibilité de jouer
    validations:
      required: true
