# ═══════════════════════════════════════════════════════════════
# Eldoria — Release : installeurs Windows / macOS / Linux
# ═══════════════════════════════════════════════════════════════
#
# Déclenchement : `git tag vX.Y.Z && git push origin vX.Y.Z`
# (ou via l'UI GitHub Releases → "Generate release" qui push le tag)
#
# Pipeline :
#   build (matrix 3 OS)
#     ├── checkout → bun → install → prisma generate
#     ├── next build (production standalone)
#     └── electron-builder --<target>  → artefact par OS
#   release (Ubuntu, dépend de build)
#     └── télécharger tous les artefacts → softprops/action-gh-release@v2
#         → crée la GitHub Release + joint les installeurs
#
# Signature de code (optionnelle) :
#   - macOS :  secrets CSC_LINK (base64 .p12) + CSC_KEY_PASSWORD
#              + secrets Apple : APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#              Sinon les DMG sont livrés non signés (Gatekeeper "non identifié").
#   - Windows : secrets CSC_LINK + CSC_KEY_PASSWORD pour un certificat Authenticode.
#              Sinon NSIS affiche un avertissement SmartScreen à l'installation.
#   - Linux : pas de signature requise (AppImage/.deb/.rpm s'installent direct).
#
# Pour activer la signature plus tard :
#   gh secret set CSC_LINK --body@certificate-base64.txt
#   gh secret set CSC_KEY_PASSWORD --body'<mot-de-passe>'
#   electron-builder lira ces secrets automatiquement.
# ═══════════════════════════════════════════════════════════════

name: Release

on:
  push:
    tags:
      - 'v*'
  # Permet aussi un déclenchement manuel depuis l'UI Actions
  workflow_dispatch:

# Annule une release en cours si un nouveau tag est poussé pendant qu'elle tourne
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Permissions minimales : on a besoin d'écrire la release
permissions:
  contents: write

env:
  BUN_VERSION: '1'
  # Désactive la télémétrie Next.js pendant le build (accélère + moins de logs)
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # ── Build matrice 3 OS ─────────────────────────────────────────
  build:
    name: 🔨 Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      # On ne fail-fast pas : si Linux casse, on veut quand même les artefacts Win/Mac
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            label: Windows (NSIS + portable)
          - os: macos-latest
            target: mac
            label: macOS (DMG + ZIP — Intel + Apple Silicon)
          - os: ubuntu-latest
            target: linux
            label: Linux (AppImage + .deb + .rpm)

    steps:
      - name: 📥 Récupération du code (full history pour le tag)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Installation de Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Installation des dépendances
        run: bun install --frozen-lockfile

      - name: 🗄️ Génération du client Prisma
        run: bun run db:generate

      - name: 🔨 Build Next.js (production standalone)
        run: bun run build

      - name: 📦 Construction des installeurs (${{ matrix.target }})
        # --publish never = pas de tentative d'upload auto sur GitHub ici,
        # c'est le job `release` qui s'en charge proprement.
        run: bun run electron-builder --${{ matrix.target }} --publish never

      - name: 📋 Inventaire des artefacts produits
        # Pour debug : liste ce que electron-builder a sorti
        run: |
          echo "=== Artefacts dans dist-electron/ ==="
          ls -lh dist-electron/ 2>&1 || dir dist-electron\ 2>nul

      - name: 📤 Upload des artefacts (pour le job `release`)
        uses: actions/upload-artifact@v4
        with:
          name: eldoria-installer-${{ matrix.target }}
          # Glob récursif : capture tous les installeurs produits
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
            dist-electron/*.blockmap
          if-no-files-found: error
          retention-days: 14

  # ── Release : attache tout à la GitHub Release ────────────────
  release:
    name: 📦 Publication de la release
    needs: build
    runs-on: ubuntu-latest

    # Garde-fou : le job release ne s'exécute que pour un vrai push de tag.
    # Sans cette condition, un déclenchement manuel depuis l'UI Actions
    # sur main/HEAD essaierait d'attacher les artefacts à "main" (qui n'est
    # pas une release GitHub valide).
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 📥 Téléchargement de tous les artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # `merge-multiple: true` (par défaut sur v4) combine tous les jobs
          # dans un seul dossier `artifacts/`.

      - name: 📋 Vérification des installeurs reçus
        run: |
          echo "=== Arborescence reçue ==="
          find artifacts -type f -printf '%p  (%s octets)\n' | sort
          echo ""
          echo "=== Total installeurs ==="
          find artifacts -type f | wc -l

      - name: 🚀 Création de la GitHub Release + attachement des installeurs
        uses: softprops/action-gh-release@v2
        with:
          # Le tag déclencheur devient le nom de la release
          tag_name: ${{ github.ref_name }}
          name: Eldoria ${{ github.ref_name }}
          # Body custom : table de téléchargements par plate-forme EN Markdown.
          # generate_release_notes: false est obligatoire car l'API GitHub fait
          # passer l'auto-gen AVANT le body — sans ça, mon body serait écrasé.
          # Le body template les filenames via `github.ref_name | replace: 'v', ''`
          # (qui eval à `0.2.1` pour le tag `v0.2.1`). Le `package.json` doit
          # être bumpé à la même valeur avant que le tag soit pushé (sinon les
          # artifacts générés par electron-builder sont nommées d'après la
          # version du package.json, pas du tag — les liens seraient 404).
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Files : tous les installeurs reçus
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.blockmap
          fail_on_unmatched_files: true
          # Body custom : table de téléchargements par plate-forme, + nota bene
          # installeurs non signés. Désactive auto-gen au-dessus pour ne pas
          # être effacer.
          body: |
            ## ⚔️ Eldoria ${{ github.ref_name }}
            
            Installeurs natifs **Windows / macOS / Linux** générés par la CI sur les runneurs natifs (`windows-latest`, `macos-latest`, `ubuntu-latest`) au commit pinné sur ce tag.
            
            ### 📥 Téléchargements directs
            
            | Plateforme | Installeur | Lien direct |
            |:--|:--|:--|
            | 🪟 **Windows** 10 / 11 | NSIS installer (x64) | [`Eldoria-${{ github.ref_name | replace: 'v', '' }}-win-x64.exe`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Eldoria-${{ github.ref_name | replace: 'v', '' }}-win-x64.exe) — double-clic, menu Démarrer, raccourci bureau |
            | 🍎 **macOS** Apple Silicon (≥ M1) | DMG ARM64 + ZIP | [`.dmg`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Eldoria-${{ github.ref_name | replace: 'v', '' }}-mac-arm64.dmg) · [`.zip`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Eldoria-${{ github.ref_name | replace: 'v', '' }}-mac-arm64.zip) — glisser dans `/Applications` |
            | 🍎 **macOS** Intel x64 | DMG x64 + ZIP | [`.dmg`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Eldoria-${{ github.ref_name | replace: 'v', '' }}-mac-x64.dmg) · [`.zip`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Eldoria-${{ github.ref_name | replace: 'v', '' }}-mac-x64.zip) — glisser dans `/Applications` |
            | 🐧 **Linux** (universal) | AppImage x64 | [`Eldoria-${{ github.ref_name | replace: 'v', '' }}-linux-x64.AppImage`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Eldoria-${{ github.ref_name | replace: 'v', '' }}-linux-x64.AppImage) — `chmod +x` puis double-clic |
            | 🐧 **Debian / Ubuntu / Mint / Pop!_OS** | `.deb` package | [`eldoria_${{ github.ref_name | replace: 'v', '' }}_amd64.deb`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/eldoria_${{ github.ref_name | replace: 'v', '' }}_amd64.deb) — `sudo dpkg -i …` |
            | 🐧 **Fedora / RHEL / openSUSE / Nobara** | `.rpm` package | [`Eldoria-${{ github.ref_name | replace: 'v', '' }}-linux-x64.rpm`](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Eldoria-${{ github.ref_name | replace: 'v', '' }}-linux-x64.rpm) — `sudo rpm -i …` |
            
            ### ⚠️ Installeurs **non signés** pour cette version (${{ github.ref_name }})
            
            * 🪟 **Windows** : SmartScreen affichera un avertissement au premier lancement → *Informations complémentaires → Exécuter quand même*.
            * 🍎 **macOS** : Gatekeeper refusera → *Clic droit sur `Eldoria.app` → Ouvrir* (une fois).
            * 🐧 **Linux** : aucune incidence, les `AppImage` / `.deb` / `.rpm` s'installent directement.
            
            Signature code Apple Developer ID + Authenticode EV prévue pour **v0.3.0** ([Voir la Roadmap](https://github.com/${{ github.repository }}#-roadmap)).
            
            ### 🔨 Compiler cette version vous-même
            
            ```bash
            # 1. bumper la version dans package.json, ajouter une entrée CHANGELOG
            # 2. commit + push le tag : release.yml construit + attache
            git tag ${{ github.ref_name }}
            git push origin main ${{ github.ref_name }}
            ```
            
            Pour + d'options d'installation (Homebrew Cask, winget, Flatpak), voir la section [📥 Téléchargements du README](https://github.com/${{ github.repository }}#-téléchargements).


  # ── (Optionnel) Build CI séparé pour valider sans tag ─────────
  # Le job `build` est déjà exécuté en CI via `ci.yml` sur chaque push.
  # Ce workflow `release.yml` ne sert explicitement qu'à publier.
