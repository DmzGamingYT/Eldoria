# ═══════════════════════════════════════════════════════════════
# Eldoria — Release : installeurs Windows / macOS / Linux
# ═══════════════════════════════════════════════════════════════
#
# Déclenchement : `git tag vX.Y.Z && git push origin vX.Y.Z`
# (ou via l'UI GitHub Releases → "Generate release" qui push le tag)
#
# Pipeline :
#   build (matrix 3 OS)
#     ├── checkout → bun → install → icons regenerate → next build
#     └── electron-builder --<target>  → artefact par OS
#   release (Ubuntu, dépend de build)
#     └── télécharger tous les artefacts → softprops/action-gh-release@v2
#         → crée la GitHub Release + joint les installeurs
#
# Signature de code (optionnelle) :
#   - macOS :  secrets CSC_LINK (base64 .p12) + CSC_KEY_PASSWORD
#              + secrets Apple : APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#              Sinon les DMG sont livrés non signés (Gatekeeper "non identifié").
#   - Windows : secrets CSC_LINK + CSC_KEY_PASSWORD pour un certificat Authenticode.
#              Sinon NSIS affiche un avertissement SmartScreen à l'installation.
#   - Linux : pas de signature requise (AppImage s'installe direct).
#
# Pour activer la signature plus tard :
#   gh secret set CSC_LINK --body@certificate-base64.txt
#   gh secret set CSC_KEY_PASSWORD --body'<mot-de-passe>'
#   electron-builder lira ces secrets automatiquement.
# ═══════════════════════════════════════════════════════════════

name: Release

on:
  push:
    tags:
      - 'v*'
  # Permet aussi un déclenchement manuel depuis l'UI Actions
  workflow_dispatch:

# Annule une release en cours si un nouveau tag est poussé pendant qu'elle tourne
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Permissions minimales : on a besoin d'écrire la release
permissions:
  contents: write

env:
  BUN_VERSION: '1'
  # Désactive la télémétrie Next.js pendant le build (accélère + moins de logs)
  NEXT_TELEMETRY_DISABLED: 1
  # Force UTF-8 partout (évite UnicodeEncodeError sur Windows avec cp1252)
  PYTHONUTF8: 1

jobs:
  # ── Build matrice 3 OS ─────────────────────────────────────────
  build:
    name: 🔨 Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      # On ne fail-fast pas : si Linux casse, on veut quand même les artefacts Win/Mac
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            label: Windows (NSIS installer)
          - os: macos-latest
            target: mac
            label: macOS (DMG — Intel + Apple Silicon)
          - os: ubuntu-latest
            target: linux
            label: Linux (AppImage)

    steps:
      - name: 📥 Récupération du code (full history pour le tag)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🟢 Installation de Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📦 Installation des dépendances
        run: bun install --frozen-lockfile

      - name: 🐍 Installation de Python (pour la régénération des icônes)
        # Pillow sérialise correctement un ICO multi-résolutions au format
        # ICONDIR + ICONDIRENTRY (Pillow.save(format='ICO', sizes=...) n'est
        # pas fiable — cf. scripts/build-icons.py module docstring). Étape
        # identique sur les 3 runners Windows/macOS/Linux.
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Installation de Pillow (version épinglée)
        # Pillow est épinglée à la version testée localement pour éviter les
        # régressions silencieuses si une future majeure change la sérialisation
        # ICONDIR. Bumper cette pin après avoir testé le pipeline release.
        run: python3 -m pip install --quiet "Pillow==10.4.0"

      - name: 🎨 Régénération des icônes multi-résolutions
        # Régénère build/icon.ico depuis le set de PNG (16/32/48/64/128/256)
        # pour éviter `Icon is not a valid ICO file` côté electron-builder
        # sur le runner Windows. Le script est idempotent : si quelqu'un
        # commit un ICO cassé, la CI le corrige automatiquement.
        run: python3 scripts/build-icons.py

      - name: 🔨 Build Next.js (production standalone)
        run: bun run build

      - name: "🔍 Diagnostic: vérifier l'encodage des noms de fichiers standalone"
        # Lists the standalone tree to verify filenames are intact before
        # electron-builder packages them. Helps diagnose encoding corruption
        # (garbled folder names) reported on Windows installs.
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "=== .next/standalone top-level ==="
          ls -la .next/standalone/ 2>&1 || true
          echo ""
          echo "=== .next/standalone depth 3 ==="
          find .next/standalone -maxdepth 3 -type d 2>&1 | head -60 || true

      - name: 🔍 Vérification de la version avant build
        # Safety net: vérifie que la version dans package.json correspond
        # au tag Git pour éviter les artefacts avec une mauvaise version
        # (ex: DMG ARM64 généré avec v0.2.3 au lieu de v0.2.4).
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "package.json version: $PKG_VERSION"
          echo "Git tag version:      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch! package.json=$PKG_VERSION but tag=$TAG_VERSION"
            exit 1
          fi
          echo "✅ Versions match: $PKG_VERSION"

      - name: 📦 Construction des installeurs (${{ matrix.target }})
        # --publish never = pas de tentative d'upload auto sur GitHub ici,
        # c'est le job `release` qui s'en charge proprement.
        run: bun run electron-builder --${{ matrix.target }} --publish never

      - name: 📋 Inventaire des artefacts produits
        # Pour debug : liste ce que electron-builder a sorti
        # shell: bash requis car ls -lh ne marche pas sous PowerShell (alias Get-ChildItem)
        shell: bash
        run: |
          echo "=== Artefacts dans dist-electron/ ==="
          ls -lh dist-electron/ 2>&1 || true

      - name: 📤 Upload des artefacts (pour le job `release`)
        uses: actions/upload-artifact@v7
        with:
          name: eldoria-installer-${{ matrix.target }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
            dist-electron/*.blockmap
            dist-electron/latest*.yml
          if-no-files-found: error
          retention-days: 14

  # ── Release : attache tout à la GitHub Release ────────────────
  release:
    name: 📦 Publication de la release
    needs: build
    runs-on: ubuntu-latest

    # Garde-fou : le job release ne s'exécute que pour un vrai push de tag.
    # Sans cette condition, un déclenchement manuel depuis l'UI Actions
    # sur main/HEAD essaierait d'attacher les artefacts à "main" (qui n'est
    # pas une release GitHub valide).
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v7

      - name: 🟢 Installation de Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: 📥 Téléchargement de tous les artefacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          # `merge-multiple: true` (par défaut sur v8) combine tous les jobs
          # dans un seul dossier `artifacts/`.

      - name: 📋 Vérification des installeurs reçus
        run: |
          echo "=== Arborescence reçue ==="
          find artifacts -type f -printf '%p  (%s octets)\n' | sort
          echo ""
          echo "=== Total installeurs ==="
          find artifacts -type f | wc -l

      - name: 📝 Génération du corps de la release (body Markdown)
        # On génère release-body.md via un script Node dédié au lieu d'un
        # heredoc inline dans le workflow :
        #   1. Le langage d'expressions GitHub Actions n'a PAS de filtre
        #      `replace` (Jinja2/Liquid). Un `${{ ... | replace }}` dans le body
        #      fait REFUSER la compilation du workflow entier ("workflow file
        #      issue", 0s). On calcule donc la version sans 'v' en JS.
        #   2. Un heredoc indenté dans `run: |` YAML est cassé (délimiteur de
        #      fin doit être en colonne 0 + le contenu garde l'indentation).
        # Le script lit TAG/REPO depuis env (fournis ci-dessous), lit aussi la
        # version dans package.json en fallback, et écrit release-body.md que
        # l'étape suivante consomme via `body_path`.
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: bun scripts/generate-release-body.mjs

      - name: 🎨 Régénération de la social card (PNG 1280×640)
        # Le SVG source public/banner/social-card.svg est versionné dans le
        # dépôt. À chaque release on régénère le PNG via sharp+librsvg pour
        # garantir la cohérence entre l'identité du projet (TL;DR, médaillon
        # Arbre d'Argent, badges tech) et les aperçus partagés (GitHub Social
        # Preview, itch.io capsule, Steamworks, Discord/Twitter/OG cards).
        # Pourquoi générer dans la CI plutôt que committer manuellement ?
        #   - Évite les diffs binaires parasites à chaque release (qu'un
        #     humain oublierait probablement de commit)
        #   - Garantit que le PNG n'est jamais stale par rapport au SVG
        #   - `bun run social-card` utilise le script Node déjà testé + la
        #     dépendance sharp déjà installée via bun install
        run: bun run social-card

      - name: 🔍 Aperçu du body généré (debug)
        run: |
          echo "=== release-body.md ==="
          cat release-body.md

      - name: 🚀 Création de la GitHub Release + attachement des installeurs
        uses: softprops/action-gh-release@v2
        with:
          # Le tag déclencheur devient le nom de la release
          tag_name: ${{ github.ref_name }}
          name: Eldoria ${{ github.ref_name }}
          # Body chargé depuis release-body.md (généré par l'étape précédente).
          # On n'utilise PAS d'expressions `${{ ... | replace: ... }}` dans le
          # body : le filtre `replace` n'existe pas dans le langage d'expressions
          # GitHub Actions (c'est du Jinja2/Liquid), ce qui fait REFUSER la
          # compilation du workflow entier ("workflow file issue", 0s). On calcule
          # donc la version sans le 'v' en shell dans l'étape précédente.
          body_path: release-body.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Files : installeurs + métadonnées electron-updater + social card
          # electron-updater a besoin de latest*.yml + .blockmap pour
          # le téléchargement différentiel et la validation SHA-512.
          # La social card PNG 1280x640 est attachée pour permettre le
          # téléchargement direct depuis la release (mise à jour manuelle
          # de l'image GitHub Social Preview via l'UI Settings).
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.blockmap
            artifacts/**/latest*.yml
            public/banner/social-card.png
          fail_on_unmatched_files: true


  # ── (Optionnel) Build CI séparé pour valider sans tag ─────────
  # Le job `build` est déjà exécuté en CI via `ci.yml` sur chaque push.
  # Ce workflow `release.yml` ne sert explicitement qu'à publier.
