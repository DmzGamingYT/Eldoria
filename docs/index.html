<style>
:root{--gold:#f6d97c;--ink:#3a2412;--bg-deep:#1a0e2e;--bg:#2a1d3e}

.card{max-width:640px;text-align:center;padding:3rem 2rem;border:1px solid var(--gold);border-radius:4px;background:rgba(58,36,18,.3)}
h1{font-size:2.5rem;color:var(--gold);margin:0 0 1rem;letter-spacing:.05em}
p{line-height:1.6}
.btn{display:inline-block;margin-top:1.5rem;padding:.75rem 1.5rem;border:1px solid var(--gold);border-radius:2px;color:var(--gold);text-decoration:none;transition:all .2s ease}
.btn:hover{background:var(--gold);color:var(--ink)}
.eyebrow{color:#a13a2a;letter-spacing:.4em;font-size:.8rem;font-weight:700;margin-bottom:.5rem}
.muted{margin-top:2rem;font-size:.9rem;opacity:.7}
.muted a{color:var(--gold);text-decoration:none}
.muted a:hover{text-decoration:underline}
</style>

</main>
