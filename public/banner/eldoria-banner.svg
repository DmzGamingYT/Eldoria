<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-label="Eldoria — Chroniques de la Forêt d'Argent">
  <title>Eldoria — Chroniques de la Forêt d'Argent</title>

  <!-- =========================  DEFS  ========================= -->
  <defs>
    <!-- Sky : nuit profonde → aube mauve → orange chaud → or -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#070219"/>
      <stop offset="22%" stop-color="#1a0838"/>
      <stop offset="45%" stop-color="#5b1c5c"/>
      <stop offset="62%" stop-color="#c84a3a"/>
      <stop offset="78%" stop-color="#f3a14a"/>
      <stop offset="100%" stop-color="#f6d97c"/>
    </linearGradient>

    <!-- Sun radial -->
    <radialGradient id="sunGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#fff6c8" stop-opacity="1"/>
      <stop offset="35%" stop-color="#ffd24a" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#f3712c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c84a3a" stop-opacity="0"/>
    </radialGradient>

    <!-- Mountain gradients (procéduraux) -->
    <linearGradient id="mtnBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5e3a82"/>
      <stop offset="100%" stop-color="#2a1850"/>
    </linearGradient>
    <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3e2566"/>
      <stop offset="100%" stop-color="#1c0f3a"/>
    </linearGradient>
    <linearGradient id="mtnFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#21123e"/>
      <stop offset="100%" stop-color="#0a041e"/>
    </linearGradient>
    <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c8b5e2" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Forest gradient -->
    <linearGradient id="forestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0e1a2a"/>
      <stop offset="100%" stop-color="#02050c"/>
    </linearGradient>

    <!-- Ground glow -->
    <radialGradient id="groundGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#ffba54" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffba54" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold title gradient -->
    <linearGradient id="goldTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff4c2"/>
      <stop offset="35%" stop-color="#f8d76a"/>
      <stop offset="65%" stop-color="#d4a537"/>
      <stop offset="100%" stop-color="#8a5d12"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for the sun + title -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b1"/>
      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sword blade gradient -->
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#9bdfff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9bdfff"/>
    </linearGradient>
    <linearGradient id="hiltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f6d97c"/>
      <stop offset="50%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#5a3e10"/>
    </linearGradient>
    <linearGradient id="gemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ff8da0"/>
      <stop offset="100%" stop-color="#9b1c3a"/>
    </linearGradient>

    <!-- Reusable star -->
    <symbol id="star" viewBox="-5 -5 10 10">
      <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="#fff8d4"/>
    </symbol>

    <!-- Reusable cloud -->
    <symbol id="cloud" viewBox="0 0 200 60">
      <ellipse cx="40"  cy="42" rx="40" ry="14" fill="#1a0e34" opacity="0.5"/>
      <ellipse cx="100" cy="32" rx="60" ry="22" fill="#1a0e34" opacity="0.55"/>
      <ellipse cx="160" cy="44" rx="42" ry="16" fill="#1a0e34" opacity="0.5"/>
    </symbol>

    <!-- Single mountain peak (with snow) -->
    <symbol id="peak" viewBox="0 0 200 200" overflow="visible">
      <path d="M0,200 L60,60 L100,160 L150,40 L200,200 Z" fill="currentColor"/>
      <path d="M55,72 L60,60 L72,86 L66,80 Z" fill="url(#snowGrad)"/>
      <path d="M145,55 L150,40 L168,90 L160,82 Z" fill="url(#snowGrad)"/>
      <path d="M95,150 L100,140 L106,148 L100,160 Z" fill="url(#snowGrad)" opacity="0.8"/>
    </symbol>
  </defs>

  <!-- =========================  BACKDROP  ========================= -->
  <rect x="0" y="0" width="1600" height="600" fill="url(#skyGrad)"/>

  <!-- =========================  STARS  (twinkling)  ========================= -->
  <g>
    <use href="#star" x="80"   y="60"  width="6" height="6">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" begin="0s"   repeatCount="indefinite"/>
    </use>
    <use href="#star" x="220"  y="100" width="5" height="5">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.2s" begin="0.4s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="380"  y="40"  width="7" height="7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" begin="0.8s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="520"  y="90"  width="4" height="4">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.2s" begin="1.2s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="700"  y="60"  width="6" height="6">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="840"  y="120" width="5" height="5">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="3.8s" begin="0.2s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="980"  y="50"  width="6" height="6">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="3.4s" begin="2.0s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="1120" y="100" width="4" height="4">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.6s" begin="0.7s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="1260" y="40"  width="7" height="7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.0s" begin="1.4s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="1400" y="80"  width="5" height="5">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.6s" begin="0.5s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="1500" y="120" width="6" height="6">
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="2.9s" begin="1.7s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="160"  y="160" width="4" height="4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4.1s" begin="0.3s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="600"  y="180" width="5" height="5">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.3s" begin="1.1s" repeatCount="indefinite"/>
    </use>
    <use href="#star" x="1300" y="170" width="4" height="4">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.7s" begin="2.1s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- =========================  CLOUDS  (drifting)  ========================= -->
  <g opacity="0.7">
    <use href="#cloud" x="-200" y="120" width="220" height="60">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 1800,0" dur="55s" repeatCount="indefinite"/>
    </use>
    <use href="#cloud" x="-400" y="180" width="260" height="70">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 1800,0" dur="75s" begin="-20s" repeatCount="indefinite"/>
    </use>
    <use href="#cloud" x="-300" y="80" width="180" height="50">
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 1800,0" dur="95s" begin="-40s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- =========================  SUN  ========================= -->
  <g transform="translate(800 380)">
    <circle r="160" fill="url(#sunGrad)" opacity="0.85" filter="url(#strongGlow)"/>
    <circle r="65"  fill="#fff4b8" filter="url(#strongGlow)">
      <animate attributeName="r" values="62;70;62" dur="4.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Glow on the horizon -->
  <ellipse cx="800" cy="500" rx="900" ry="120" fill="url(#groundGlow)"/>

  <!-- =========================  MOUNTAINS  ========================= -->
  <!-- arrière-plan (les plus hautes, plus pâles) -->
  <g transform="translate(0 320)" fill="url(#mtnBack)" opacity="0.95">
    <path d="M-50,150 L100,40 L260,110 L420,30 L580,120 L740,20 L900,110 L1080,40 L1260,120 L1440,30 L1620,110 L1700,150 Z"/>
  </g>
  <!-- milieu -->
  <g transform="translate(0 350)" fill="url(#mtnMid)">
    <path d="M-50,120 L80,60 L220,100 L380,40 L520,90 L680,30 L860,90 L1020,40 L1180,100 L1340,30 L1500,100 L1700,150 L1700,150 Z"/>
  </g>
  <!-- avant-plan -->
  <g transform="translate(0 380)" fill="url(#mtnFront)">
    <path d="M-50,90 L60,50 L200,90 L320,30 L460,90 L600,40 L740,90 L880,30 L1020,100 L1180,40 L1320,90 L1480,40 L1700,90 L1700,150 L-50,150 Z"/>
  </g>

  <!-- Quelques sapins isolés -->
  <g fill="#0a1a14" opacity="0.85">
    <polygon points="120,470 130,420 140,470"/>
    <polygon points="118,470 130,408 142,470"/>
    <polygon points="320,490 332,432 344,490"/>
    <polygon points="318,490 332,420 346,490"/>
    <polygon points="1240,485 1252,430 1264,485"/>
    <polygon points="1238,485 1252,418 1266,485"/>
    <polygon points="1450,495 1462,440 1474,495"/>
    <polygon points="1448,495 1462,428 1476,495"/>
  </g>

  <!-- =========================  GROUND / FOREST FLOOR  ========================= -->
  <rect x="0" y="490" width="1600" height="110" fill="url(#forestGrad)"/>
  <!-- tree-line silhouette -->
  <g fill="#0a0814">
    <path d="M0,490 L20,460 L40,490 L70,455 L100,490 L130,445 L170,490 L210,460 L260,490
            L300,450 L350,490 L400,460 L450,490 L500,445 L560,490
            L610,460 L660,490 L710,450 L770,490 L820,455 L880,490
            L930,445 L990,490 L1040,460 L1100,490 L1150,455 L1210,490
            L1260,440 L1320,490 L1370,455 L1430,490 L1480,460 L1540,490
            L1600,455 L1600,510 L0,510 Z"/>
  </g>

  <!-- =========================  TITLE  ========================= -->
  <g transform="translate(800 195)" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif">
    <!-- halo derrière le titre -->
    <ellipse cx="0" cy="0" rx="540" ry="80" fill="#f6d97c" opacity="0.12" filter="url(#strongGlow)"/>

    <!-- Titre principal ⚔ ELDORIA ⚔ -->
    <text x="0" y="0" font-size="148" font-weight="900" letter-spacing="14"
          fill="url(#goldTitle)" stroke="#3a2412" stroke-width="2"
          filter="url(#softGlow)">
      ⚔  ELDORIA  ⚔
      <animate attributeName="opacity" values="0;1;1" dur="1.4s" fill="freeze"/>
    </text>

    <!-- Sous-titre -->
    <text x="0" y="60" font-size="30" font-style="italic" font-weight="500"
          fill="#fff4c8" opacity="0.95">
      Chroniques de la Forêt d'Argent
      <animate attributeName="opacity" values="0;0;0.95" dur="2.2s" begin="0.6s" fill="freeze"/>
    </text>

    <!-- Filet décoratif -->
    <g transform="translate(0 100)" stroke="#f6d97c" stroke-linecap="round" opacity="0.85">
      <line x1="-230" y1="0" x2="-40" y2="0" stroke-width="1.5"/>
      <line x1="40"   y1="0" x2="230" y2="0" stroke-width="1.5"/>
      <circle cx="-230" cy="0" r="3" fill="#f6d97c"/>
      <circle cx="230"  cy="0" r="3" fill="#f6d97c"/>
      <text x="0" y="6" font-size="22" fill="#f6d97c" stroke="none" text-anchor="middle">
        ❦
        <animate attributeName="opacity" values="0;0;1" dur="2.6s" begin="1.2s" fill="freeze"/>
      </text>
    </g>
  </g>

  <!-- =========================  FLOATING SWORDS  ========================= -->
  <!-- Épée gauche -->
  <g transform="translate(360 220)" filter="url(#strongGlow)">
    <animateTransform attributeName="transform" type="translate"
      values="360,220; 360,210; 360,220" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4.5s" repeatCount="indefinite"/>
    <g transform="rotate(-18)">
      <!-- lame -->
      <path d="M0,-90 L8,-10 L4,80 L-4,80 L-8,-10 Z" fill="url(#bladeGrad)" stroke="#cfeaff" stroke-width="0.6"/>
      <!-- tranchant -->
      <path d="M-8,-10 L8,-10" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
      <!-- garde -->
      <rect x="-22" y="-6" width="44" height="8" rx="3" fill="url(#hiltGrad)" stroke="#3a2412" stroke-width="0.8"/>
      <rect x="-30" y="-12" width="8"  height="20" rx="2" fill="url(#hiltGrad)"/>
      <rect x="22"  y="-12" width="8"  height="20" rx="2" fill="url(#hiltGrad)"/>
      <!-- poignée -->
      <rect x="-5" y="4" width="10" height="22" rx="3" fill="#3a2412"/>
      <rect x="-5" y="10" width="10" height="2" fill="#1c0e08"/>
      <!-- pommeau -->
      <circle cx="0" cy="32" r="7" fill="url(#gemGrad)" stroke="#3a2412" stroke-width="1"/>
      <circle cx="0" cy="30" r="2.5" fill="#fff6c8" opacity="0.8"/>
    </g>
  </g>

  <!-- Épée droite -->
  <g transform="translate(1240 220)" filter="url(#strongGlow)">
    <animateTransform attributeName="transform" type="translate"
      values="1240,220; 1240,210; 1240,220" dur="4.5s" begin="2.25s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="4.5s" begin="2.25s" repeatCount="indefinite"/>
    <g transform="rotate(18)">
      <path d="M0,-90 L8,-10 L4,80 L-4,80 L-8,-10 Z" fill="url(#bladeGrad)" stroke="#cfeaff" stroke-width="0.6"/>
      <path d="M-8,-10 L8,-10" stroke="#fff" stroke-width="0.5" opacity="0.7"/>
      <rect x="-22" y="-6" width="44" height="8" rx="3" fill="url(#hiltGrad)" stroke="#3a2412" stroke-width="0.8"/>
      <rect x="-30" y="-12" width="8"  height="20" rx="2" fill="url(#hiltGrad)"/>
      <rect x="22"  y="-12" width="8"  height="20" rx="2" fill="url(#hiltGrad)"/>
      <rect x="-5" y="4" width="10" height="22" rx="3" fill="#3a2412"/>
      <rect x="-5" y="10" width="10" height="2" fill="#1c0e08"/>
      <circle cx="0" cy="32" r="7" fill="url(#gemGrad)" stroke="#3a2412" stroke-width="1"/>
      <circle cx="0" cy="30" r="2.5" fill="#fff6c8" opacity="0.8"/>
    </g>
  </g>

  <!-- Petites étincelles flottantes -->
  <g fill="#f6d97c">
    <circle cx="430" cy="170" r="2.2"><animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="120" r="1.8"><animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="140" r="2.2"><animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="1170" cy="180" r="1.8"><animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="80" r="2.5"><animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="1.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Bordure dorée ornementale -->
  <rect x="6" y="6" width="1588" height="588" fill="none"
        stroke="url(#goldTitle)" stroke-width="2" opacity="0.6" rx="14"/>
  <rect x="14" y="14" width="1572" height="572" fill="none"
        stroke="url(#goldTitle)" stroke-width="0.6" opacity="0.4" rx="10"/>
</svg>
