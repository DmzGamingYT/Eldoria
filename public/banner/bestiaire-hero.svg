<svg viewBox="0 0 1300 400" xmlns="http://www.w3.org/2000/svg" width="100%" style="max-width:1100px">
    <defs>
      <linearGradient id="enemyCard" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff4c2"/><stop offset="100%" stop-color="#d8be83"/></linearGradient>
      <radialGradient id="slimeGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#5fd35f"/><stop offset="100%" stop-color="#3a8a3a" stop-opacity="0"/></radialGradient>
      <radialGradient id="bossAuraCard" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#ff3344" stop-opacity="0.7"/><stop offset="100%" stop-color="#ff3344" stop-opacity="0"/></radialGradient>
    </defs>

    <!-- Slime -->
    <g transform="translate(80 60)">
      <rect x="-50" y="-20" width="160" height="280" rx="10" fill="url(#enemyCard)" stroke="#a07c3a" stroke-width="2"><animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.6s" begin="0s" repeatCount="indefinite"/></rect>
      <circle r="55" cx="30" cy="100" fill="url(#slimeGlow)" opacity="0.6">
        <animate attributeName="r" values="50;60;50" dur="2s" repeatCount="indefinite"/>
      </circle>
      <ellipse cx="30" cy="100" rx="38" ry="40" fill="#5fd35f" opacity="0.85"/>
      <ellipse cx="30" cy="90" rx="30" ry="10" fill="#fff" opacity="0.6"/>
      <ellipse cx="20" cy="98" rx="6" ry="9" fill="#1a1a1a"/>
      <ellipse cx="40" cy="98" rx="6" ry="9" fill="#1a1a1a"/>
      <ellipse cx="30" cy="120" rx="4" ry="2" fill="#1a1a1a"/>
      <rect x="-50" y="180" width="160" height="26" fill="#3a2412" stroke="#f6d97c" stroke-width="1.5" rx="3"><animate attributeName="fill-opacity" values="0;1" dur="1.6s" begin="0.2s" fill="freeze"/></rect>
      <text x="30" y="199" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f6d97c" letter-spacing="2">SLIME VERT</text>
      <text x="30" y="219" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5a3a1f">PV 25 • ATQ 4</text>
      <text x="30" y="243" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#a07c3a">★☆☆☆☆</text>
    </g>

    <!-- Goblin -->
    <g transform="translate(280 60)">
      <rect x="-50" y="-20" width="160" height="280" rx="10" fill="url(#enemyCard)" stroke="#a07c3a" stroke-width="2"><animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.6s" begin="0.3s" repeatCount="indefinite"/></rect>
      <!-- Oversized pointy ears -->
      <polygon points="6,52 18,32 22,60" fill="#5a8a3a" stroke="#3a5a1a" stroke-width="0.6"/>
      <polygon points="54,52 42,32 38,60" fill="#5a8a3a" stroke="#3a5a1a" stroke-width="0.6"/>
      <polygon points="10,46 16,38 18,52" fill="#7aa55a"/>
      <polygon points="50,46 44,38 42,52" fill="#7aa55a"/>
      <!-- Head (green) -->
      <ellipse cx="30" cy="65" rx="24" ry="26" fill="#6a9a4a"/>
      <ellipse cx="30" cy="62" rx="22" ry="22" fill="#7aa55a"/>
      <!-- Cheek shadows -->
      <ellipse cx="20" cy="72" rx="3" ry="5" fill="#4a7a2a" opacity="0.5"/>
      <ellipse cx="40" cy="72" rx="3" ry="5" fill="#4a7a2a" opacity="0.5"/>
      <!-- Yellow slitted eyes -->
      <ellipse cx="22" cy="58" rx="3.5" ry="6" fill="#f4d35a"/>
      <ellipse cx="22" cy="58" rx="1.5" ry="4.5" fill="#1a1a1a"/>
      <ellipse cx="38" cy="58" rx="3.5" ry="6" fill="#f4d35a"/>
      <ellipse cx="38" cy="58" rx="1.5" ry="4.5" fill="#1a1a1a"/>
