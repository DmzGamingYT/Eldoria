      <ellipse cx="135" cy="50" rx="26" ry="20" fill="#5a3a1a"/>
      <!-- Iron spikes around club head -->
      <polygon points="135,18 130,32 140,32" fill="#8a8a8a" stroke="#3a3a3a" stroke-width="0.4"/>
      <polygon points="108,38 112,52 100,48" fill="#8a8a8a" stroke="#3a3a3a" stroke-width="0.4"/>
      <polygon points="162,38 158,52 170,48" fill="#8a8a8a" stroke="#3a3a3a" stroke-width="0.4"/>
      <polygon points="104,60 113,66 106,72" fill="#8a8a8a" stroke="#3a3a3a" stroke-width="0.4"/>
      <polygon points="166,60 157,66 164,72" fill="#8a8a8a" stroke="#3a3a3a" stroke-width="0.4"/>
      <polygon points="118,80 124,86 120,90" fill="#8a8a8a" stroke="#3a3a3a" stroke-width="0.4"/>
      <polygon points="152,80 146,86 150,90" fill="#8a8a8a" stroke="#3a3a3a" stroke-width="0.4"/>
      <!-- Stump legs -->
