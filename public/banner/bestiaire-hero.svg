      <!-- Crooked grin -->
      <path d="M22,82 Q30,90 38,82" fill="none" stroke="#3a2412" stroke-width="2"/>
      <!-- Fang -->
      <polygon points="29,84 31,84 30,91" fill="#fff"/>
      <!-- Body (greenish tunic, ragged hem) -->
      <path d="M8,95 Q30,88 52,95 L50,148 Q30,158 10,148 Z" fill="#5a8a3a"/>
      <!-- Belt -->
      <rect x="10" y="145" width="40" height="6" fill="#3a2412"/>
      <rect x="27" y="143" width="6" height="10" fill="#a07c3a"/>
      <!-- Loincloth (dark olive, jagged) -->
      <path d="M14,151 L18,168 L24,158 L30,170 L36,158 L42,170 L46,151 Z" fill="#3a4a1a"/>
      <!-- Right arm -->
      <path d="M48,108 Q60,118 62,128" fill="none" stroke="#6a9a4a" stroke-width="7" stroke-linecap="round"/>
      <!-- Dagger handle (wood) -->
      <rect x="56" y="118" width="5" height="22" fill="#5a3a1a" rx="1"/>
      <!-- Dagger crossguard (iron) -->
      <rect x="54" y="116" width="9" height="4" fill="#7a7a7a"/>
      <!-- Dagger blade -->
      <polygon points="56,116 62,116 59,94" fill="#d0d0d0" stroke="#7a7a7a" stroke-width="0.5"/>
      <!-- Dagger tip gleam -->
      <circle cx="59" cy="95" r="1" fill="#fff"/>
      <!-- Plaque + stats (unified y baseline) -->
      <rect x="-50" y="180" width="160" height="26" fill="#3a2412" stroke="#f6d97c" stroke-width="1.5" rx="3"><animate attributeName="fill-opacity" values="0;1" dur="1.6s" begin="0.4s" fill="freeze"/></rect>
      <text x="30" y="199" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f6d97c" letter-spacing="2">PILLARD GOBELIN</text>
      <text x="30" y="219" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5a3a1f">PV 45 • ATQ 8</text>
      <text x="30" y="243" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#a07c3a">★★☆☆☆</text>
    </g>

    <!-- Wolf -->
    <g transform="translate(480 60)">
      <rect x="-50" y="-20" width="160" height="280" rx="10" fill="url(#enemyCard)" stroke="#a07c3a" stroke-width="2"><animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.6s" begin="0.6s" repeatCount="indefinite"/></rect>
      <!-- Drooped bushy tail (behind body) -->
      <path d="M-4,108 Q-14,122 -10,145 Q-7,162 2,165 Q10,158 6,140 Q6,124 4,112 Z" fill="#6b6b6b" stroke="#3a3a3a" stroke-width="0.6"/>
      <path d="M-3,128 Q-6,142 -4,154" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
      <path d="M1,130 Q-2,144 0,156" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
      <!-- Body main -->
