      <polygon points="60,76 66,76 63,90" fill="#fff" stroke="#a0a0a0" stroke-width="0.3"/>
      <!-- Belly fold lines -->
      <line x1="30" y1="120" x2="30" y2="142" stroke="#3a4a1a" stroke-width="1"/>
      <line x1="70" y1="120" x2="70" y2="142" stroke="#3a4a1a" stroke-width="1"/>
      <!-- Plaque + stats (unified y baseline) -->
      <rect x="-50" y="180" width="190" height="26" fill="#3a2412" stroke="#f6d97c" stroke-width="1.5" rx="3"><animate attributeName="fill-opacity" values="0;1" dur="1.6s" begin="1.0s" fill="freeze"/></rect>
      <text x="50" y="199" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#f6d97c" letter-spacing="2">OGRE DES CAVERNES</text>
      <text x="50" y="219" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5a3a1f">PV 160 • ATQ 26</text>
      <text x="50" y="243" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-style="italic" fill="#a07c3a">★★★★★</text>
    </g>

    <!-- Boss Mordrak -->
