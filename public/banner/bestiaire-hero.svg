      <ellipse cx="68" cy="162" rx="6" ry="3" fill="#3a3a3a"/>
      <ellipse cx="8" cy="160" rx="6" ry="3" fill="#3a3a3a"/>
      <ellipse cx="24" cy="162" rx="6" ry="3" fill="#3a3a3a"/>
      <!-- Claws -->
      <line x1="50" y1="164" x2="52" y2="166" stroke="#fff" stroke-width="1"/>
      <line x1="55" y1="164" x2="55" y2="167" stroke="#fff" stroke-width="1"/>
      <line x1="60" y1="164" x2="58" y2="166" stroke="#fff" stroke-width="1"/>
