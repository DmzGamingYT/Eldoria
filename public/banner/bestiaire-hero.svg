      <line x1="55" y1="135" x2="55" y2="160" stroke="#6a6a6a" stroke-width="7" stroke-linecap="round"/>
      <line x1="68" y1="135" x2="68" y2="160" stroke="#6a6a6a" stroke-width="7" stroke-linecap="round"/>
      <line x1="10" y1="135" x2="8" y2="158" stroke="#6a6a6a" stroke-width="7" stroke-linecap="round"/>
      <line x1="22" y1="138" x2="24" y2="160" stroke="#6a6a6a" stroke-width="7" stroke-linecap="round"/>
