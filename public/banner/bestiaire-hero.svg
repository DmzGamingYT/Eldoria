      <!-- Nose tip (black) -->
      <ellipse cx="102" cy="103" rx="4" ry="3" fill="#1a1a1a"/>
      <!-- Mouth slight open -->
      <path d="M88,108 Q94,114 100,108" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <!-- Tongue hint -->
      <path d="M92,110 Q94,114 96,110" fill="#c2563a" opacity="0.7"/>
      <!-- Ears (triangular, standing) -->
      <polygon points="55,70 56,52 68,72" fill="#5a5a5a"/>
      <polygon points="58,68 59,60 64,68" fill="#a87a7a"/>
      <polygon points="74,62 80,46 86,64" fill="#5a5a5a"/>
      <polygon points="76,64 80,54 84,66" fill="#a87a7a"/>
