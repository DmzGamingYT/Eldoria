<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Le Grand Sceau d'Eldoria — emblème cinématique du royaume">
  <title>Le Grand Sceau d'Eldoria</title>
  <desc>Emblème central animé représentant les six piliers d'Eldoria — bestiaire, quêtes, mentors, coffres, recettes, arts arcanes — irradiant depuis l'Arbre d'Argent. Chiffres réels : 6+1 créatures, 5 quêtes, 4 mentors, 7 coffres, 7 recettes, 5 sorts.</desc>
  <defs>
    <linearGradient id="capGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2"/><stop offset="50%" stop-color="#f6d97c"/><stop offset="100%" stop-color="#a07c3a"/>
    </linearGradient>
    <linearGradient id="capParch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0838"/><stop offset="100%" stop-color="#3a2412"/>
    </linearGradient>
    <radialGradient id="capCenterGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff4c2" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#f6d97c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f6d97c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="capLootGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f6d97c"/><stop offset="100%" stop-color="#a07c3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="capFireGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff8a96"/><stop offset="100%" stop-color="#ff3344" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="capRune" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6d97c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f6d97c"/><stop offset="100%" stop-color="#f6d97c" stop-opacity="0"/>
    </linearGradient>
    <filter id="capBlur"><feGaussianBlur stdDeviation="1.4"/></filter>
  </defs>

  <!-- Backdrop cartouche -->
  <rect width="1100" height="560" rx="14" fill="url(#capParch)"/>
  <rect x="6" y="6" width="1088" height="548" fill="none" stroke="url(#capGold)" stroke-width="2" opacity="0.6" rx="12"/>
  <rect x="14" y="14" width="1072" height="532" fill="none" stroke="#f6d97c" stroke-width="0.5" opacity="0.4" rx="10"/>
  <text x="20" y="40" font-family="Georgia, serif" font-size="20" fill="#a07c3a">❦</text>
  <text x="1080" y="40" font-family="Georgia, serif" font-size="20" fill="#a07c3a" text-anchor="end">❧</text>
  <text x="20" y="540" font-family="Georgia, serif" font-size="20" fill="#a07c3a">❧</text>
  <text x="1080" y="540" font-family="Georgia, serif" font-size="20" fill="#a07c3a" text-anchor="end">❦</text>

  <!-- Twinkling backdrop stars -->
  <g fill="#f6d97c">
    <circle cx="120" cy="120" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="140" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="430" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="420" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="500" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="500" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="2.0s" repeatCount="indefinite"/></circle>
    <circle cx="40" cy="280" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="280" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Eyebrow -->
  <g transform="translate(550 28)" text-anchor="middle">
    <ellipse cx="0" cy="6" rx="320" ry="14" fill="url(#capCenterGlow)" opacity="0.5"/>
    <text font-family="Georgia, serif" font-size="11" fill="#f6d97c" letter-spacing="6" font-weight="bold">◆  SIX PILIERS — UN SEUL ROYAUME  ◆</text>
  </g>

  <!-- Halo + dashed rotating ring + middle ring -->
  <circle cx="550" cy="300" r="200" fill="url(#capCenterGlow)">
    <animate attributeName="r" values="190;215;190" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(550 300)">
    <g>
      <circle r="178" fill="none" stroke="url(#capRune)" stroke-width="2.5" stroke-dasharray="3 8" opacity="0.7"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="48s" repeatCount="indefinite"/>
    </g>
    <g fill="#f6d97c" font-family="Georgia, serif" font-size="14">
      <text x="0" y="-185" text-anchor="middle">✦</text>
      <text x="131" y="-131" text-anchor="middle">✧</text>
      <text x="185" y="0" text-anchor="middle" dy="5">◆</text>
      <text x="131" y="131" text-anchor="middle">✦</text>
      <text x="0" y="190" text-anchor="middle" dy="6">✧</text>
      <text x="-131" y="131" text-anchor="middle">◆</text>
      <text x="-185" y="0" text-anchor="middle" dy="5">✧</text>
      <text x="-131" y="-131" text-anchor="middle">✦</text>
    </g>
  </g>

  <g transform="translate(550 300)">
    <circle r="140" fill="none" stroke="#a07c3a" stroke-width="1" stroke-dasharray="2 6" opacity="0.5"/>
    <g>
      <circle r="140" fill="none" stroke="#f6d97c" stroke-width="0.6" opacity="0.5"/>
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="72s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Central sigil — L'Arbre d'Argent -->
  <g transform="translate(550 300)">
    <circle r="118" fill="#1a0838" stroke="url(#capGold)" stroke-width="2.5"/>
    <circle r="112" fill="none" stroke="#f6d97c" stroke-width="0.5" opacity="0.5"/>
    <circle r="100" fill="none" stroke="#a07c3a" stroke-width="1" opacity="0.7"/>

    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="40s" repeatCount="indefinite"/>
      <g stroke="#f6d97c" stroke-width="1.2" opacity="0.75" fill="none">
        <line x1="-90" y1="0" x2="90" y2="0"/>
        <line x1="0" y1="-90" x2="0" y2="90"/>
        <line x1="-64" y1="-64" x2="64" y2="64"/>
        <line x1="-64" y1="64" x2="64" y2="-64"/>
      </g>
    </g>

    <g transform="translate(0 -8)">
      <path d="M-3,30 L-3,-10 L3,-10 L3,30 Z" fill="#3a2412"/>
      <path d="M-3,-10 L3,-10 L3,-20 L-3,-20 Z" fill="#5a3a1f"/>
      <path d="M-12,32 Q0,28 12,32 Q6,38 0,40 Q-6,38 -12,32 Z" fill="#3a2412"/>
      <g fill="#fff4c2" stroke="#a07c3a" stroke-width="0.6">
        <circle cx="-32" cy="-38" r="18" opacity="0.85"/>
        <circle cx="32" cy="-38" r="18" opacity="0.85"/>
        <circle cx="0" cy="-58" r="20" opacity="0.85"/>
        <circle cx="-22" cy="-22" r="14" opacity="0.75"/>
        <circle cx="22" cy="-22" r="14" opacity="0.75"/>
      </g>
      <circle cx="0" cy="-46" r="6" fill="#ff5722" filter="url(#capBlur)">
        <animate attributeName="r" values="5;9;5" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <text x="0" y="86" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a07c3a" letter-spacing="3" font-style="italic">le grimoire compte</text>
    <text x="0" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="900" fill="#f6d97c">52+</text>
    <text x="0" y="124" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#a07c3a" letter-spacing="3" font-style="italic">entités tissées</text>
  </g>

  <!-- Six radiating spokes (visible only between center and each medallion) -->
  <line x1="550" y1="190" x2="550" y2="148" stroke="url(#capGold)" stroke-width="2" opacity="0.85"/>
  <line x1="650" y1="220" x2="780" y2="180" stroke="url(#capGold)" stroke-width="2" opacity="0.85"/>
  <line x1="650" y1="380" x2="780" y2="420" stroke="url(#capGold)" stroke-width="2" opacity="0.85"/>
  <line x1="550" y1="410" x2="550" y2="450" stroke="url(#capGold)" stroke-width="2" opacity="0.85"/>
  <line x1="450" y1="380" x2="320" y2="420" stroke="url(#capGold)" stroke-width="2" opacity="0.85"/>
  <line x1="450" y1="220" x2="320" y2="180" stroke="url(#capGold)" stroke-width="2" opacity="0.85"/>

  <!-- Rayon 1: TOP — BESTIAIRE -->
  <g transform="translate(550 95)">
    <circle r="50" fill="#fff4c2" stroke="url(#capGold)" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="40" fill="url(#capCenterGlow)" opacity="0.5"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="900" fill="#a13a2a">6+1</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#3a2412" letter-spacing="2">BESTIAIRE</text>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">6 créatures + Mordrak</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" repeatCount="indefinite"/>
  </g>

  <!-- Rayon 2: TOP-RIGHT — QUÊTES -->
  <g transform="translate(850 162)">
    <circle r="50" fill="#fff4c2" stroke="url(#capGold)" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="40" fill="url(#capCenterGlow)" opacity="0.5"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#a13a2a">5</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#3a2412" letter-spacing="2">QUÊTES</text>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">chaîne héroïque</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="0.6s" repeatCount="indefinite"/>
  </g>

  <!-- Rayon 3: BOTTOM-RIGHT — MENTORS -->
  <g transform="translate(850 442)">
    <circle r="50" fill="#fff4c2" stroke="url(#capGold)" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="40" fill="url(#capCenterGlow)" opacity="0.5"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#a13a2a">4</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#3a2412" letter-spacing="2">MENTORS</text>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">PNJ &amp; dialogues</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="1.2s" repeatCount="indefinite"/>
  </g>

  <!-- Rayon 4: BOTTOM — COFFRES -->
  <g transform="translate(550 480)">
    <circle r="50" fill="#fff4c2" stroke="url(#capGold)" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="40" fill="url(#capLootGlow)" opacity="0.7"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#a13a2a">7</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#3a2412" letter-spacing="2">COFFRES</text>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">butins cachés</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
  </g>

  <!-- Rayon 5: BOTTOM-LEFT — RECETTES -->
  <g transform="translate(250 442)">
    <circle r="50" fill="#fff4c2" stroke="url(#capGold)" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="40" fill="url(#capCenterGlow)" opacity="0.5"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#a13a2a">7</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#3a2412" letter-spacing="2">RECETTES</text>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">forge d'armes &amp; potions</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="2.4s" repeatCount="indefinite"/>
  </g>

  <!-- Rayon 6: TOP-LEFT — SORTS -->
  <g transform="translate(250 162)">
    <circle r="50" fill="#fff4c2" stroke="url(#capGold)" stroke-width="2"/>
    <circle r="44" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="40" fill="url(#capFireGlow)" opacity="0.55"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="900" fill="#a13a2a">5</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#3a2412" letter-spacing="2">ARTS ARCANES</text>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">sorts cycliques</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="3.0s" repeatCount="indefinite"/>
  </g>

  <!-- Bottom legend text -->
  <text x="550" y="544" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a07c3a" font-style="italic" letter-spacing="2">✦ chaque rayon pulse vers le sceau central — l'Arbre d'Argent, âme du royaume ✦</text>
</svg>
