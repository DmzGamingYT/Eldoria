<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 220" role="img" aria-label="Signature Eldoria">
  <title>Signature Eldoria</title>
  <defs>
    <linearGradient id="lineGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3a2412" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a07c3a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#f6d97c" stop-opacity="1"/>
      <stop offset="80%" stop-color="#a07c3a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3a2412" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bladeFoot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#9bdfff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9bdfff"/>
    </linearGradient>

    <linearGradient id="hiltFoot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f6d97c"/>
      <stop offset="50%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#5a3e10"/>
    </linearGradient>

    <radialGradient id="auraFoot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#fff6c8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff6c8" stop-opacity="0"/>
    </radialGradient>

    <filter id="footGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <symbol id="dustStar" viewBox="-5 -5 10 10">
      <circle r="2" fill="#f6d97c"/>
      <circle r="1" fill="#ffffff"/>
    </symbol>
  </defs>

  <!-- Background subtle dark fade -->
  <rect x="0" y="0" width="1600" height="220" fill="#1a0838" opacity="0.0"/>

  <!-- Two long flourish lines -->
  <g stroke="url(#lineGold)" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M50,110 Q200,90 360,110"/>
    <path d="M1240,110 Q1400,90 1550,110"/>
    <path d="M50,110 Q200,130 360,110" opacity="0.5"/>
    <path d="M1240,110 Q1400,130 1550,110" opacity="0.5"/>
  </g>

  <!-- Center : cross swords + crown sigil -->
  <g transform="translate(800 110)" filter="url(#footGlow)">
    <!-- Halo -->
    <circle r="90" fill="url(#auraFoot)">
      <animate attributeName="r" values="80;100;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Two crossed swords -->
    <g transform="rotate(-25)">
      <path d="M0,-65 L6,-2 L3,60 L-3,60 L-6,-2 Z" fill="url(#bladeFoot)" stroke="#cfeaff" stroke-width="0.6"/>
      <rect x="-18" y="-2" width="36" height="6" rx="3" fill="url(#hiltFoot)" stroke="#3a2412" stroke-width="0.7"/>
      <rect x="-5" y="4" width="10" height="20" rx="3" fill="#3a2412"/>
      <circle cx="0" cy="28" r="6" fill="#a13a2a" stroke="#3a2412" stroke-width="0.8"/>
      <circle cx="0" cy="26" r="2" fill="#fff6c8"/>
    </g>
    <g transform="rotate(25)">
      <path d="M0,-65 L6,-2 L3,60 L-3,60 L-6,-2 Z" fill="url(#bladeFoot)" stroke="#cfeaff" stroke-width="0.6"/>
      <rect x="-18" y="-2" width="36" height="6" rx="3" fill="url(#hiltFoot)" stroke="#3a2412" stroke-width="0.7"/>
      <rect x="-5" y="4" width="10" height="20" rx="3" fill="#3a2412"/>
      <circle cx="0" cy="28" r="6" fill="#a13a2a" stroke="#3a2412" stroke-width="0.8"/>
      <circle cx="0" cy="26" r="2" fill="#fff6c8"/>
    </g>

    <!-- Crown sigil -->
    <g transform="translate(0 -88)" fill="url(#hiltFoot)" stroke="#3a2412" stroke-width="0.8">
      <path d="M-14,0 L-12,-14 L-6,-6 L0,-18 L6,-6 L12,-14 L14,0 Z"/>
      <rect x="-14" y="0" width="28" height="3"/>
      <circle cx="-12" cy="-14" r="1.5" fill="#ff3344" stroke="none"/>
      <circle cx="0"  cy="-18" r="2" fill="#ff3344" stroke="none"/>
      <circle cx="12" cy="-14" r="1.5" fill="#ff3344" stroke="none"/>
    </g>

    <!-- Animated rotation of the whole thing -->
    <animateTransform attributeName="transform" type="rotate"
      values="0 800 110; -2 800 110; 2 800 110; 0 800 110" dur="6s" repeatCount="indefinite"/>
  </g>

  <!-- Title text at center -->
  <g transform="translate(800 175)" text-anchor="middle">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#f6d97c"
          font-weight="bold" letter-spacing="6" filter="url(#footGlow)">
      ❦ Explorez • Combattez • Triomphez ❦
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Animated sparkle dust -->
  <g>
    <use href="#dustStar" x="100"  y="60"  width="6" height="6">
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="0s"   repeatCount="indefinite"/>
    </use>
    <use href="#dustStar" x="220"  y="160" width="5" height="5">
      <animate attributeName="opacity" values="0;1;0" dur="3.2s" begin="0.4s" repeatCount="indefinite"/>
    </use>
    <use href="#dustStar" x="380"  y="80"  width="6" height="6">
      <animate attributeName="opacity" values="0;1;0" dur="2.9s" begin="0.8s" repeatCount="indefinite"/>
    </use>
    <use href="#dustStar" x="500"  y="170" width="4" height="4">
      <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="1.2s" repeatCount="indefinite"/>
    </use>
    <use href="#dustStar" x="1100" y="80"  width="6" height="6">
      <animate attributeName="opacity" values="0;1;0" dur="2.7s" begin="1.6s" repeatCount="indefinite"/>
    </use>
    <use href="#dustStar" x="1220" y="160" width="5" height="5">
      <animate attributeName="opacity" values="0;1;0" dur="3.1s" begin="2.0s" repeatCount="indefinite"/>
    </use>
    <use href="#dustStar" x="1380" y="60"  width="6" height="6">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    </use>
    <use href="#dustStar" x="1500" y="170" width="4" height="4">
      <animate attributeName="opacity" values="0;1;0" dur="3.4s" begin="1.4s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- Ornamental «❧» at each end of the lines -->
  <text x="40"   y="120" font-size="36" fill="#f6d97c" font-family="Georgia, serif" text-anchor="middle" filter="url(#footGlow)">❦</text>
  <text x="1560" y="120" font-size="36" fill="#f6d97c" font-family="Georgia, serif" text-anchor="middle" filter="url(#footGlow)">❧</text>
</svg>
