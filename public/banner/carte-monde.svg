<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Carte du monde d'Eldoria — sept territoires rayonnant depuis le Village central">
  <title>Carte du monde d'Eldoria</title>
  <desc>Topographie du sanctuaire : un village central relié par six chemins d'or à cinq territoires (ruines nord, bois loups, forêt gobelin, champs slimes, cavernes ogres) et, au nord lointain, le donjon de Mordrak le Seigneur des Ombres.</desc>

  <defs>
    <!-- Shared gold gradient (matches sceau-capot + carres-savoir) -->
    <linearGradient id="cmGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2"/>
      <stop offset="50%" stop-color="#f6d97c"/>
      <stop offset="100%" stop-color="#a07c3a"/>
    </linearGradient>
    <!-- Dark cinematic backdrop (matches sceau-capot capParch) -->
    <linearGradient id="cmParch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0838"/>
      <stop offset="100%" stop-color="#3a2412"/>
    </linearGradient>
    <!-- Dark footer banner (matches carres-savoir csDark) -->
    <linearGradient id="cmDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#3a2412"/>
    </linearGradient>
    <!-- Center radial glow (matches sceau capCenterGlow) -->
    <radialGradient id="cmCenterGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff4c2" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#f6d97c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f6d97c" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle per-biome tints so each medallion stays distinguishable -->
    <radialGradient id="cmTintSlime" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5fd35f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#5fd35f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cmTintGobelin" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c0854a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c0854a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cmTintLoup" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#9aa3b0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9aa3b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cmTintSkeleton" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f5f5f5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f5f5f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cmTintOgre" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#b07ac8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#b07ac8" stop-opacity="0"/>
    </radialGradient>
    <!-- Mordrak boss emblem: red wash -->
    <radialGradient id="cmMordrak" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff5468" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ff3344" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a0808" stop-opacity="0"/>
    </radialGradient>
    <!-- Spoke radial fade-out -->
    <linearGradient id="cmSpoke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f6d97c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f6d97c" stop-opacity="0"/>
    </linearGradient>
    <filter id="cmBlur"><feGaussianBlur stdDeviation="1.4"/></filter>
  </defs>

  <!-- ============ BACKDROP + FRAME (matches sceau-capot + carres-savoir) ============ -->
  <rect width="1100" height="720" rx="14" fill="url(#cmParch)"/>
  <rect x="6" y="6" width="1088" height="708" fill="none" stroke="url(#cmGold)" stroke-width="2" opacity="0.6" rx="12"/>
  <rect x="14" y="14" width="1072" height="692" fill="none" stroke="#f6d97c" stroke-width="0.5" opacity="0.4" rx="10"/>
  <text x="20" y="40" font-family="Georgia, serif" font-size="20" fill="#a07c3a">❦</text>
  <text x="1080" y="40" font-family="Georgia, serif" font-size="20" fill="#a07c3a" text-anchor="end">❧</text>
  <text x="20" y="700" font-family="Georgia, serif" font-size="20" fill="#a07c3a">❧</text>
  <text x="1080" y="700" font-family="Georgia, serif" font-size="20" fill="#a07c3a" text-anchor="end">❦</text>

  <!-- ============ TWINKLING STARS (6, matches sceau density) ============ -->
  <g fill="#f6d97c">
    <circle cx="120" cy="120" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="140" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="80" cy="430" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="420" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="600" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="600" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" begin="2.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- ============ EYEBROW HEADER (matches sceau-capot) ============ -->
  <g transform="translate(550 28)" text-anchor="middle">
    <ellipse cx="0" cy="6" rx="340" ry="14" fill="url(#cmCenterGlow)" opacity="0.45"/>
    <text font-family="Georgia, serif" font-size="11" fill="#f6d97c" letter-spacing="6" font-weight="bold">◆  CARTOGRAPHIE DU SANCTUAIRE  ◆</text>
  </g>
  <text x="550" y="58" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a07c3a" font-style="italic" letter-spacing="3">200 × 200 cases · sept territoires · un seul foyer</text>

  <!-- ============ ROTATING AMBIENT RINGS (matches sceau-capot rotating runes) ============ -->
  <g transform="translate(550 380)">
    <g>
      <circle r="178" fill="none" stroke="url(#cmGold)" stroke-width="2" stroke-dasharray="3 8" opacity="0.6"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="48s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle r="140" fill="none" stroke="#a07c3a" stroke-width="0.8" stroke-dasharray="2 6" opacity="0.5"/>
      <animateTransform attributeName="transform" type="rotate" values="360;0" dur="72s" repeatCount="indefinite"/>
    </g>
    <g fill="#f6d97c" font-family="Georgia, serif" font-size="14" opacity="0.6">
      <text x="0" y="-185" text-anchor="middle">✦</text>
      <text x="131" y="-131" text-anchor="middle">✧</text>
      <text x="185" y="0" text-anchor="middle" dy="5">◆</text>
      <text x="131" y="131" text-anchor="middle">✦</text>
      <text x="0" y="190" text-anchor="middle" dy="6">✧</text>
      <text x="-131" y="131" text-anchor="middle">◆</text>
      <text x="-185" y="0" text-anchor="middle" dy="5">✧</text>
      <text x="-131" y="-131" text-anchor="middle">✦</text>
    </g>
  </g>

  <!-- ============ GOLD RADIAL SPOKES (village → 5 biomes + sub-spoke to Mordrak) ============ -->
  <!-- NB: spoke endpoints are computed so each line emerges from the village medallion edge (r=60)
       and terminates at the biome medallion edge (r=44), staying visible between glow halos. -->
  <line x1="550" y1="320" x2="550" y2="233" stroke="url(#cmGold)" stroke-width="2.5" opacity="0.85"/>          <!-- N: village → Mordrak -->
  <line x1="502" y1="344" x2="465" y2="316" stroke="url(#cmGold)" stroke-width="2.5" opacity="0.85"/>          <!-- NW: village → Ruines -->
  <line x1="596" y1="342" x2="636" y2="308" stroke="url(#cmGold)" stroke-width="2.5" opacity="0.85"/>          <!-- NE: village → Bois -->
  <line x1="596" y1="418" x2="636" y2="452" stroke="url(#cmGold)" stroke-width="2.5" opacity="0.85"/>          <!-- SE: village → Gobelin -->
  <line x1="550" y1="440" x2="550" y2="466" stroke="url(#cmGold)" stroke-width="2.5" opacity="0.85"/>          <!-- S: village → Slimes -->
  <line x1="504" y1="418" x2="464" y2="452" stroke="url(#cmGold)" stroke-width="2.5" opacity="0.85"/>          <!-- SW: village → Cavernes -->

  <!-- ============ MORDRAL BOSS EMBLEM (top, special red variant) ============ -->
  <g transform="translate(550 175)">
    <circle r="46" fill="url(#cmMordrak)">
      <animate attributeName="r" values="42;52;42" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="56" fill="#1a0808" stroke="#ff3344" stroke-width="2.5"/>
    <circle r="50" fill="none" stroke="#ff8a96" stroke-width="0.8" opacity="0.6"/>
    <!-- Skull silhouette inside -->
    <ellipse cx="0" cy="-2" rx="20" ry="24" fill="#f5e6c8" stroke="#ff3344" stroke-width="1.2"/>
    <ellipse cx="-8" cy="-2" rx="4" ry="6" fill="#ff3344">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="8" cy="-2" rx="4" ry="6" fill="#ff3344">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.1s" begin="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <path d="M-3,12 Q0,16 3,12" fill="none" stroke="#3a2412" stroke-width="1.4"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2.4s" repeatCount="indefinite"/>
  </g>
  <text x="550" y="80" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#ff8a96" letter-spacing="3">⚔ DONJON DE MORDRAK ⚔</text>
  <text x="550" y="96" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#ff5468" font-style="italic" letter-spacing="2">PV 600 · ATQ 40 · ✦✦✦ BOSS</text>

  <!-- ============ BIOME MEDALLIONS (cream-on-dark, sceau-capot idiom) ============ -->
  <!-- NW (diagonal, breaks vertical overlap with Mordrak): RUINES SQUELETTES ★★★★ -->
  <g transform="translate(430 290)">
    <circle r="44" fill="#fff4c2" stroke="url(#cmGold)" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="34" fill="url(#cmTintSkeleton)" opacity="0.85"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="900" fill="#a13a2a">★★★★</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#3a2412" letter-spacing="2">RUINES</text>
    <text x="0" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">nord glacial</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="0s" repeatCount="indefinite"/>
  </g>

  <!-- NE: BOIS LOUPS ★★★ -->
  <g transform="translate(670 320)">
    <circle r="44" fill="#fff4c2" stroke="url(#cmGold)" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="34" fill="url(#cmTintLoup)" opacity="0.85"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="900" fill="#a13a2a">★★★</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#3a2412" letter-spacing="2">LOUPS</text>
    <text x="0" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">bois sinistres</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="0.6s" repeatCount="indefinite"/>
  </g>

  <!-- SE: GOBELINS ★★ -->
  <g transform="translate(670 480)">
    <circle r="44" fill="#fff4c2" stroke="url(#cmGold)" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="34" fill="url(#cmTintGobelin)" opacity="0.85"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="900" fill="#a13a2a">★★</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#3a2412" letter-spacing="2">GOBELINS</text>
    <text x="0" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">forêt profonde</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="1.2s" repeatCount="indefinite"/>
  </g>

  <!-- S: SLIMES ★ -->
  <g transform="translate(550 495)">
    <circle r="44" fill="#fff4c2" stroke="url(#cmGold)" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="34" fill="url(#cmTintSlime)" opacity="0.85"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="900" fill="#a13a2a">★</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#3a2412" letter-spacing="2">SLIMES</text>
    <text x="0" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">champs de l'est</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="1.8s" repeatCount="indefinite"/>
  </g>

  <!-- SW: OGRES ★★★★★ -->
  <g transform="translate(430 480)">
    <circle r="44" fill="#fff4c2" stroke="url(#cmGold)" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#a07c3a" stroke-width="0.6" opacity="0.6"/>
    <circle cx="0" cy="-6" r="34" fill="url(#cmTintOgre)" opacity="0.85"/>
    <text x="0" y="0" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="900" fill="#a13a2a">★★★★★</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#3a2412" letter-spacing="2">OGRES</text>
    <text x="0" y="32" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#5a3a1f" font-style="italic">cavernes de l'ouest</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" begin="2.4s" repeatCount="indefinite"/>
  </g>

  <!-- ============ VILLAGE CENTRAL (hub) ============ -->
  <g transform="translate(550 380)">
    <!-- Pulsing halo (smaller radius so it stays inside the biome ring instead of overlapping the 5 medallions; matches sceau's central sigil scale, not the full 200 px halo) -->
    <circle r="42" fill="url(#cmCenterGlow)">
      <animate attributeName="r" values="36;48;36" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.95;0.5" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <!-- Cream medallion (larger than biomes) -->
    <circle r="60" fill="#fff4c2" stroke="url(#cmGold)" stroke-width="2.5"/>
    <circle r="54" fill="none" stroke="#a07c3a" stroke-width="0.7" opacity="0.7"/>
    <!-- Dark inner cameo (matches sceau's central sigil pattern) -->
    <circle r="42" fill="#1a0838" stroke="#a07c3a" stroke-width="0.8"/>
    <!-- Village silhouette (houses + roofs) -->
    <g transform="translate(0 -4)" fill="#a07c3a" stroke="#3a2412" stroke-width="0.6">
      <polygon points="-22,12 -22,-2 -8,-12 6,-2 6,12"/>
      <rect x="-22" y="12" width="28" height="6"/>
      <polygon points="-4,18 -4,8 14,8 14,18 18,8 22,18"/>
      <rect x="20" y="-6" width="10" height="14"/>
      <polygon points="20,-6 25,-14 30,-6"/>
    </g>
    <!-- Pulsing red heart of the village -->
    <circle cx="0" cy="20" r="4" fill="#ff5722" filter="url(#cmBlur)">
      <animate attributeName="r" values="3;6;3" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="550" y="478" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#f6d97c" letter-spacing="3">♕ LE VILLAGE CENTRAL ♕</text>

  <!-- ============ BOTTOM LEGEND BAR (matches carres-savoir footer; tightened to clear corner ornaments at y=700) ============ -->
  <g transform="translate(550 668)">
    <rect x="-460" y="-15" width="920" height="30" rx="5" fill="url(#cmDark)" stroke="url(#cmGold)" stroke-width="1.2" opacity="0.95"/>
    <rect x="-454" y="-10" width="908" height="20" rx="3" fill="none" stroke="#f6d97c" stroke-width="0.4" opacity="0.5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#f6d97c" letter-spacing="4" font-weight="bold">◈ ÉCHELLE DE DIFFICULTÉ ◈</text>
    <g font-family="Georgia, serif" font-size="9">
      <text x="-410" y="11" text-anchor="middle" fill="#5fd35f">★</text>
      <text x="-380" y="11" text-anchor="end" fill="#cfb88a">slimes</text>
      <text x="-260" y="11" text-anchor="middle" fill="#c0854a">★★</text>
      <text x="-220" y="11" text-anchor="end" fill="#cfb88a">gobelins</text>
      <text x="-100" y="11" text-anchor="middle" fill="#9aa3b0">★★★</text>
      <text x="-50"  y="11" text-anchor="end" fill="#cfb88a">loups</text>
      <text x="80"   y="11" text-anchor="middle" fill="#f5f5f5">★★★★</text>
      <text x="135"  y="11" text-anchor="end" fill="#cfb88a">squelettes</text>
      <text x="265"  y="11" text-anchor="middle" fill="#b07ac8">★★★★★</text>
      <text x="320"  y="11" text-anchor="end" fill="#cfb88a">ogres</text>
      <text x="395"  y="11" text-anchor="middle" fill="#ff3344">✦✦✦</text>
      <text x="430"  y="11" text-anchor="end" fill="#cfb88a">Mordrak</text>
    </g>
  </g>

  <!-- ============ TOP-LEFT CARTOUCHE: SCALE + CYCLE (subtle decorative) ============ -->
  <g transform="translate(120 130)" text-anchor="middle">
    <circle r="38" fill="none" stroke="#a07c3a" stroke-width="0.8" opacity="0.7"/>
    <text y="-12" font-family="Georgia, serif" font-size="18" fill="#f6d97c">☀</text>
    <text y="6" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="#f6d97c" letter-spacing="3">CYCLE</text>
    <text y="20" font-family="Georgia, serif" font-size="9" fill="#a07c3a" font-style="italic">180 s · jour/nuit</text>
  </g>
</svg>
