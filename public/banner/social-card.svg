<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0e2e"/>
      <stop offset="100%" stop-color="#070219"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2"/>
      <stop offset="100%" stop-color="#a07c3a"/>
    </linearGradient>
    <linearGradient id="goldTitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2"/>
      <stop offset="40%" stop-color="#f8d76a"/>
      <stop offset="100%" stop-color="#a07c3a"/>
    </linearGradient>
    <linearGradient id="parchmentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8e9c5"/>
      <stop offset="100%" stop-color="#d8be83"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle outer + inner borders -->
  <rect x="20" y="20" width="1240" height="600" fill="none" stroke="url(#goldGrad)" stroke-width="2" rx="12" opacity="0.5"/>
  <rect x="30" y="30" width="1220" height="580" fill="none" stroke="#a07c3a" stroke-width="1" rx="8" opacity="0.4"/>

  <!-- ================ LEFT — TITLE / TL;DR ================ -->
  <g transform="translate(80, 200)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="92" font-weight="900" letter-spacing="8" fill="url(#goldTitle)" stroke="#3a2412" stroke-width="1.4" filter="url(#glow)">⚔ ELDORIA ⚔</text>
    <text x="5" y="80" font-family="Georgia, serif" font-size="34" font-style="italic" fill="#f8e9c5">Un RPG fantasy 3D natif &amp; navigateur.</text>
    <text x="5" y="130" font-family="Georgia, serif" font-size="24" fill="#d8be83">Monde procédural 200×200, combat en temps réel.</text>
    <text x="5" y="170" font-family="Georgia, serif" font-size="24" fill="#d8be83">5 sorts, 5 actes → boss final : Mordrak.</text>
    <text x="5" y="210" font-family="Georgia, serif" font-size="24" fill="#d8be83">Talents multi-rang · combat rapide · Frostpeak.</text>
  </g>

  <!-- Tech badges — bottom-left (Georgia serif pour cohérence avec le reste) -->
  <g transform="translate(80, 510)" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" fill="#fff4c2">
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="115" height="36" rx="18" fill="#1a0e2e" stroke="#a07c3a" stroke-width="1.5"/>
      <text x="57" y="23" text-anchor="middle">Next.js 16</text>
    </g>
    <g transform="translate(130, 0)">
      <rect x="0" y="0" width="105" height="36" rx="18" fill="#1a0e2e" stroke="#a07c3a" stroke-width="1.5"/>
      <text x="52" y="23" text-anchor="middle">R3F 9</text>
    </g>
    <g transform="translate(250, 0)">
      <rect x="0" y="0" width="130" height="36" rx="18" fill="#1a0e2e" stroke="#a07c3a" stroke-width="1.5"/>
      <text x="65" y="23" text-anchor="middle">Electron 42</text>
    </g>
    <g transform="translate(395, 0)">
      <rect x="0" y="0" width="110" height="36" rx="18" fill="#1a0e2e" stroke="#a07c3a" stroke-width="1.5"/>
      <text x="55" y="23" text-anchor="middle">Prisma 6</text>
    </g>
    <g transform="translate(520, 0)">
      <rect x="0" y="0" width="175" height="36" rx="18" fill="#1a0e2e" stroke="#a07c3a" stroke-width="1.5"/>
      <text x="87" y="23" text-anchor="middle">Win · macOS · Linux</text>
    </g>
  </g>

  <!-- ================ RIGHT — HERO MEDALLION ================ -->
  <g transform="translate(940, 320)">
    <circle cx="0" cy="0" r="230" fill="#f6d97c" opacity="0.15" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="220" fill="#3a2412" stroke="url(#goldGrad)" stroke-width="6"/>
    <circle cx="0" cy="0" r="208" fill="none" stroke="#a07c3a" stroke-width="1.5" stroke-dasharray="8 4"/>
    <circle cx="0" cy="0" r="185" fill="url(#parchmentGrad)" stroke="#a07c3a" stroke-width="3"/>

    <!-- Stylized Arbre d'Argent (silver tree), scaled up for hero size -->
    <g transform="scale(3.5) translate(0, 8)">
      <g stroke="#a07c3a" stroke-width="1.8" stroke-linecap="round" fill="none">
        <line x1="0" y1="20" x2="0" y2="-12"/>
        <path d="M -15 -6 Q 0 -22 15 -6"/>
        <path d="M -12 6 Q 0 -10 12 6"/>
        <path d="M -8 16 Q 0 4 8 16"/>
      </g>
      <circle cx="0" cy="-14" r="6" fill="#fff4c2" stroke="#a07c3a" stroke-width="1"/>
      <circle cx="-18" cy="3" r="5" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.9"/>
      <circle cx="18" cy="3" r="5" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.9"/>
      <circle cx="-8" cy="14" r="4" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.7"/>
      <circle cx="8" cy="14" r="4" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.7"/>
    </g>
  </g>

  <!-- Footer URL — bottom-right -->
  <text x="1200" y="600" text-anchor="end" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#a07c3a">github.com/DmzGamingYT/Eldoria</text>
  <!-- Footer version — bottom-left -->
  <text x="50" y="600" text-anchor="start" font-family="Georgia, serif" font-size="20" fill="#f6d97c">v0.4.0 · Gratuit &amp; open-source</text>
</svg>
