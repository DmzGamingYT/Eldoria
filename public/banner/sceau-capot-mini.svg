<svg viewBox="0 0 1100 160" xmlns="http://www.w3.org/2000/svg" width="100%" style="max-width:1100px">
  <defs>
    <linearGradient id="sP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8e9c5"/><stop offset="100%" stop-color="#d8be83"/>
    </linearGradient>
    <linearGradient id="sG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2"/><stop offset="100%" stop-color="#a07c3a"/>
    </linearGradient>
  </defs>
  <!-- Parchment backdrop -->
  <rect x="20" y="20" width="1060" height="120" rx="8" fill="url(#sP)" stroke="url(#sG)" stroke-width="2"/>
  <rect x="28" y="28" width="1044" height="104" rx="6" fill="none" stroke="#a07c3a" stroke-width="0.5" opacity="0.55"/>
  <text x="550" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a13a2a" letter-spacing="5" font-weight="bold">◈ LE SCEAU D'ELDORIA ◈</text>
  <text x="38" y="135" font-family="Georgia, serif" font-size="14" fill="#a07c3a">❦</text>
  <text x="1062" y="135" text-anchor="end" font-family="Georgia, serif" font-size="14" fill="#a07c3a">❧</text>
  <!-- Twin gold rules flanking the medallion -->
  <line x1="80" y1="80" x2="450" y2="80" stroke="url(#sG)" stroke-width="1.2"/>
  <line x1="650" y1="80" x2="1020" y2="80" stroke="url(#sG)" stroke-width="1.2"/>
  <circle cx="80" cy="80" r="2.5" fill="#f6d97c"/><circle cx="1020" cy="80" r="2.5" fill="#f6d97c"/>
  <!-- Medallion (dark outer ring + parchment-fill inner) -->
  <circle cx="550" cy="80" r="56" fill="#3a2412" stroke="url(#sG)" stroke-width="2.5"/>
  <circle cx="550" cy="80" r="48" fill="url(#sP)" stroke="#a07c3a" stroke-width="0.7"/>
  <!-- Stylized Arbre d'Argent -->
  <g transform="translate(550 88)" stroke="#a07c3a" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="0" y1="20" x2="0" y2="-8"/>
    <path d="M -10 -4 Q 0 -16 10 -4"/>
    <path d="M -8 4 Q 0 -8 8 4"/>
    <path d="M -5 12 Q 0 2 5 12"/>
  </g>
  <!-- Floating silver leaves with subtle twinkle -->
  <circle cx="550" cy="74" r="4" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.7">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="538" cy="82" r="3" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.5"/>
  <circle cx="562" cy="82" r="3" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.5"/>
  <!-- Italic tagline -->
  <text x="550" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#5a3a1f">Du téléchargement au premier pas dans le sanctuaire</text>
</svg>
