<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 340" width="100%" style="max-width:1300px">
  <defs>
    <linearGradient id="rlBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0838"/>
      <stop offset="55%" stop-color="#2a1638"/>
      <stop offset="100%" stop-color="#3a2412"/>
    </linearGradient>
    <linearGradient id="rlGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2"/>
      <stop offset="50%" stop-color="#f6d97c"/>
      <stop offset="100%" stop-color="#a07c3a"/>
    </linearGradient>
    <linearGradient id="rlPlaque" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2412"/>
      <stop offset="100%" stop-color="#1a0838"/>
    </linearGradient>
    <linearGradient id="rlPillDone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fd35f"/>
      <stop offset="100%" stop-color="#2a6a2a"/>
    </linearGradient>
    <linearGradient id="rlPillWip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6d97c"/>
      <stop offset="100%" stop-color="#a07c3a"/>
    </linearGradient>
    <radialGradient id="rlGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff4c2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff4c2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rlHaloDone" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5fd35f" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#2a6a2a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2a6a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rlHaloWip" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f6d97c" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#a07c3a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a07c3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rlHaloFuture" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff4c2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff4c2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rlHaloDream" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff5468" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff5468" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background + frame -->
  <rect x="0" y="0" width="1300" height="340" fill="url(#rlBg)" rx="10"/>
  <rect x="6" y="6" width="1288" height="328" fill="none" stroke="url(#rlGold)" stroke-width="2" opacity="0.85" rx="8">
    <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="4.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="14" y="14" width="1272" height="312" fill="none" stroke="#f6d97c" stroke-width="0.5" opacity="0.4" rx="6"/>

  <!-- Corner ornaments -->
  <circle cx="22" cy="22" r="3" fill="#f6d97c">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1278" cy="22" r="3" fill="#f6d97c">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="318" r="3" fill="#f6d97c">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1278" cy="318" r="3" fill="#f6d97c">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" begin="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Eyebrow cartouche -->
  <g transform="translate(650 24)" text-anchor="middle">
    <ellipse cx="0" cy="6" rx="340" ry="14" fill="url(#rlGlow)"/>
    <rect x="-280" y="0" width="560" height="22" fill="url(#rlPlaque)" stroke="#f6d97c" stroke-width="1" rx="4">
      <animate attributeName="fill-opacity" values="0;1" dur="1.6s" fill="freeze"/>
    </rect>
    <text fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="11" letter-spacing="5" font-weight="bold">❖  LA FEUILLE DE ROUTE  ❖</text>
    <text y="40" fill="#a07c3a" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">Cinq jalons d'Eldoria — du prototype livré au rêve du monde persistant.</text>
  </g>

  <!-- Connecting timeline -->
  <line x1="140" y1="175" x2="1170" y2="175" stroke="url(#rlGold)" stroke-width="2" opacity="0.4" stroke-dasharray="3 4"/>

  <!-- Phase 1 — MVP v0.1 -->
  <g transform="translate(140 175)">
    <g transform="translate(0 -88)">
      <rect x="-32" y="-9" width="64" height="18" rx="9" fill="url(#rlPillDone)" stroke="#5fd35f" stroke-width="1"/>
      <text fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" letter-spacing="1.4" font-weight="bold" text-anchor="middle" y="4">LIVRÉ</text>
    </g>
    <g transform="translate(0 -52)">
      <rect x="-45" y="-14" width="90" height="28" fill="url(#rlPlaque)" stroke="#a07c3a" stroke-width="1.2" rx="4"/>
      <text fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold" text-anchor="middle" y="4">MVP v0.1</text>
    </g>
    <circle cx="0" cy="0" r="24" fill="url(#rlHaloDone)" opacity="0.9"/>
    <circle cx="0" cy="0" r="13" fill="#1a0838" stroke="#5fd35f" stroke-width="1.5"/>
    <text y="6" text-anchor="middle" fill="#5fd35f" font-family="Georgia,'Times New Roman',serif" font-size="18">✓</text>
    <g transform="translate(0 50)">
      <rect x="-72" y="0" width="144" height="56" fill="url(#rlPlaque)" stroke="#a07c3a" stroke-width="1" rx="4"/>
      <text x="0" y="18" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold" letter-spacing="0.6">MONOÏDE 3D</text>
      <text x="0" y="34" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">5+1 ennemis, 5 quêtes,</text>
      <text x="0" y="46" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">base Electron stable</text>
    </g>
  </g>

  <!-- Phase 2 — v0.2 — en cours -->
  <g transform="translate(380 175)">
    <g transform="translate(0 -88)">
      <rect x="-40" y="-9" width="80" height="18" rx="9" fill="url(#rlPillWip)" stroke="#f6d97c" stroke-width="1">
        <animate attributeName="fill-opacity" values="0.7;1;0.7" dur="1.6s" repeatCount="indefinite"/>
      </rect>
      <text fill="#1a0838" font-family="Georgia,'Times New Roman',serif" font-size="9" letter-spacing="1.4" font-weight="bold" text-anchor="middle" y="4">EN COURS</text>
    </g>
    <g transform="translate(0 -52)">
      <rect x="-62" y="-14" width="124" height="28" fill="url(#rlPlaque)" stroke="#f6d97c" stroke-width="1.4" rx="4">
        <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
      </rect>
      <text fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold" text-anchor="middle" y="4">v0.2 — en cours</text>
    </g>
    <circle cx="0" cy="0" r="32" fill="url(#rlHaloWip)" opacity="0.7">
      <animate attributeName="r" values="30;36;30" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="18" fill="#1a0838" stroke="#f6d97c" stroke-width="1.8"/>
    <text y="6" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="20">⚒</text>
    <g transform="translate(0 50)">
      <rect x="-78" y="0" width="156" height="56" fill="url(#rlPlaque)" stroke="#f6d97c" stroke-width="1" rx="4"/>
      <text x="0" y="18" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold" letter-spacing="0.6">QUATERNIUS LIVE</text>
      <text x="0" y="34" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">Modèles réels,</text>
      <text x="0" y="46" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">animations, audio complet</text>
    </g>
  </g>

  <!-- Phase 3 — v0.3 — à venir -->
  <g transform="translate(650 175)">
    <g transform="translate(0 -88)">
      <rect x="-36" y="-9" width="72" height="18" rx="9" fill="#3a2412" stroke="#f6d97c" stroke-width="1"/>
      <text fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="9" letter-spacing="1.4" font-weight="bold" text-anchor="middle" y="4">À VENIR</text>
    </g>
    <g transform="translate(0 -52)">
      <rect x="-60" y="-14" width="120" height="28" fill="url(#rlPlaque)" stroke="#a07c3a" stroke-width="1.2" rx="4"/>
      <text fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold" text-anchor="middle" y="4">v0.3 — à venir</text>
    </g>
    <circle cx="0" cy="0" r="24" fill="url(#rlHaloFuture)" opacity="0.7"/>
    <circle cx="0" cy="0" r="13" fill="#1a0838" stroke="#f6d97c" stroke-width="1.5"/>
    <text y="6" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="20">✧</text>
    <g transform="translate(0 50)">
      <rect x="-82" y="0" width="164" height="56" fill="url(#rlPlaque)" stroke="#a07c3a" stroke-width="1" rx="4"/>
      <text x="0" y="18" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold" letter-spacing="0.6">ARBRE DE TALENTS</text>
      <text x="0" y="34" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">PNJ secondaires, tower</text>
      <text x="0" y="46" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">defense, quêtes ramifiées</text>
    </g>
  </g>

  <!-- Phase 4 — v1.0 — rêve -->
  <g transform="translate(920 175)">
    <g transform="translate(0 -88)">
      <rect x="-30" y="-9" width="60" height="18" rx="9" fill="#3a2412" stroke="#f6d97c" stroke-width="1"/>
      <text fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="9" letter-spacing="1.4" font-weight="bold" text-anchor="middle" y="4">RÊVE</text>
    </g>
    <g transform="translate(0 -52)">
      <rect x="-54" y="-14" width="108" height="28" fill="url(#rlPlaque)" stroke="#a07c3a" stroke-width="1.2" rx="4"/>
      <text fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold" text-anchor="middle" y="4">v1.0 — rêve</text>
    </g>
    <circle cx="0" cy="0" r="24" fill="url(#rlHaloFuture)" opacity="0.7"/>
    <circle cx="0" cy="0" r="13" fill="#1a0838" stroke="#f6d97c" stroke-width="1.5"/>
    <text y="6" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="18">♛</text>
    <g transform="translate(0 50)">
      <rect x="-95" y="0" width="190" height="56" fill="url(#rlPlaque)" stroke="#a07c3a" stroke-width="1" rx="4"/>
      <text x="0" y="18" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="10" font-weight="bold" letter-spacing="0.6">MULTIJOUEUR COOPÉRATIF</text>
      <text x="0" y="34" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">Guildes, raids,</text>
      <text x="0" y="46" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">commerce entre joueurs</text>
    </g>
  </g>

  <!-- Phase 5 — + loin -->
  <g transform="translate(1170 175)">
    <g transform="translate(0 -88)">
      <rect x="-34" y="-9" width="68" height="18" rx="9" fill="#3a2412" stroke="#ff5468" stroke-width="1"/>
      <text fill="#ff5468" font-family="Georgia,'Times New Roman',serif" font-size="9" letter-spacing="1.4" font-weight="bold" text-anchor="middle" y="4">AU-DELÀ</text>
    </g>
    <g transform="translate(0 -52)">
      <rect x="-40" y="-14" width="80" height="28" fill="url(#rlPlaque)" stroke="#ff5468" stroke-width="1.2" rx="4"/>
      <text fill="#ff5468" font-family="Georgia,'Times New Roman',serif" font-size="11" font-weight="bold" text-anchor="middle" y="4">+ loin</text>
    </g>
    <circle cx="0" cy="0" r="20" fill="url(#rlHaloDream)" opacity="0.8"/>
    <circle cx="0" cy="0" r="11" fill="#1a0838" stroke="#ff5468" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" fill="#ff5468" font-family="Georgia,'Times New Roman',serif" font-size="14">◉</text>
    <g transform="translate(0 50)">
      <rect x="-66" y="0" width="132" height="40" fill="url(#rlPlaque)" stroke="#ff5468" stroke-width="1" rx="4"/>
      <text x="0" y="18" text-anchor="middle" fill="#ff5468" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">un horizon</text>
      <text x="0" y="32" text-anchor="middle" fill="#ff5468" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic">à inventer</text>
    </g>
  </g>

  <!-- Footer ornaments + tagline -->
  <line x1="180" y1="328" x2="420" y2="328" stroke="url(#rlGold)" stroke-width="1" opacity="0.7"/>
  <line x1="880" y1="328" x2="1120" y2="328" stroke="url(#rlGold)" stroke-width="1" opacity="0.7"/>
  <circle cx="170" cy="328" r="3" fill="#f6d97c">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1130" cy="328" r="3" fill="#f6d97c">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" begin="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="650" y="332" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="11" font-style="italic">❖  chaque phase tisse sa légende  ❖</text>
</svg>
