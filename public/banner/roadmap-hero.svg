<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 340" width="100%" style="max-width:1300px">
  <defs>
    <linearGradient id="rlBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0838"/><stop offset="55%" stop-color="#2a1638"/><stop offset="100%" stop-color="#3a2412"/></linearGradient>
    <linearGradient id="rlGold" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff4c2"/><stop offset="50%" stop-color="#f6d97c"/><stop offset="100%" stop-color="#a07c3a"/></linearGradient>
    <linearGradient id="rlLine" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3a7a3a"/><stop offset="28%" stop-color="#f6d97c"/><stop offset="70%" stop-color="#a07c3a"/><stop offset="100%" stop-color="#ff5468"/></linearGradient>
    <radialGradient id="rlGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#fff4c2" stop-opacity="0.55"/><stop offset="100%" stop-color="#fff4c2" stop-opacity="0"/></radialGradient>
    <radialGradient id="rlGlowGold" cx="0.5" cy="0.5" r="0.5"><stop offset="0%" stop-color="#f6d97c" stop-opacity="0.7"/><stop offset="100%" stop-color="#f6d97c" stop-opacity="0"/></radialGradient>
    <linearGradient id="rlPlaque" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3a2412"/><stop offset="100%" stop-color="#1a0838"/></linearGradient>
  </defs>

  <!-- Background + frame -->
  <rect x="0" y="0" width="1300" height="340" fill="url(#rlBg)" rx="10"/>
  <rect x="6" y="6" width="1288" height="328" fill="none" stroke="url(#rlGold)" stroke-width="2" opacity="0.85" rx="8">
    <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="4.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="14" y="14" width="1272" height="312" fill="none" stroke="#f6d97c" stroke-width="0.5" opacity="0.4" rx="6"/>

  <!-- Corner ornaments -->
  <circle cx="22" cy="22" r="3" fill="#f6d97c"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="1278" cy="22" r="3" fill="#f6d97c"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" begin="0.8s" repeatCount="indefinite"/></circle>
  <circle cx="22" cy="318" r="3" fill="#f6d97c"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" begin="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="1278" cy="318" r="3" fill="#f6d97c"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" begin="2.4s" repeatCount="indefinite"/></circle>

  <!-- Eyebrow cartouche -->
  <g transform="translate(650 38)" text-anchor="middle">
    <ellipse cx="0" cy="6" rx="320" ry="14" fill="url(#rlGlow)"/>
    <rect x="-260" y="0" width="520" height="22" fill="url(#rlPlaque)" stroke="#f6d97c" stroke-width="1" rx="4">
      <animate attributeName="fill-opacity" values="0;1" dur="1.6s" fill="freeze"/>
    </rect>
    <text fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="12" font-weight="bold" textLength="500" lengthAdjust="spacingAndGlyphs">◆ LA FEUILLE DE ROUTE ◆</text>
    <text y="40" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="13" font-style="italic" textLength="510" lengthAdjust="spacingAndGlyphs">
      <tspan>Cinq jalons d'Eldoria — du prototype livré au rêve du monde persistant.</tspan>
      <animate attributeName="opacity" values="0;1" dur="1.8s" fill="freeze"/>
    </text>
  </g>

  <!-- Timeline track with glow halo -->
  <g transform="translate(0 175)">
    <line x1="100" y1="0" x2="1200" y2="0" stroke="url(#rlLine)" stroke-width="18" stroke-linecap="round" opacity="0.22"/>
    <line x1="100" y1="0" x2="1200" y2="0" stroke="url(#rlLine)" stroke-width="4" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 1100;1100 0" dur="3.6s" fill="freeze"/>
    </line>
    <circle r="10" fill="#fff4c2" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="100;1200" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="0" dur="9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══ PHASE 1 — MVP v0.1 (livré) ═══ — anchor x=140 (symmetric) -->
  <g transform="translate(140 175)">
    <circle r="38" fill="url(#rlGlow)" opacity="0.7"/>
    <circle r="22" fill="#3a7a3a" stroke="#fff4c2" stroke-width="2.5">
      <animate attributeName="r" values="22;24;22" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <text y="7" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#fff4c2">✓</text>
    <!-- Title plaque above (translated -60 — 21px eyebrow breathing room + halo clearance) -->
    <g transform="translate(0 -60)">
      <rect x="-50" y="-14" width="100" height="28" fill="url(#rlPlaque)" stroke="#3a7a3a" stroke-width="1.2" rx="4"/>
      <text x="0" y="4" text-anchor="middle" fill="#3a7a3a" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold" textLength="92" lengthAdjust="spacingAndGlyphs">MVP v0.1</text>
      <text x="0" y="18" text-anchor="middle" fill="#5fd35f" font-family="Georgia,'Times New Roman',serif" font-size="7.5" letter-spacing="1.4" textLength="64" lengthAdjust="spacingAndGlyphs">LIVRÉ</text>
    </g>
    <!-- Subtitle plaque below -->
    <g transform="translate(0 76)">
      <rect x="-60" y="0" width="120" height="56" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.9" rx="4" opacity="0.95"/>
      <text x="0" y="16" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="8" font-weight="bold" textLength="110" lengthAdjust="spacingAndGlyphs">MONOÏDE 3D</text>
      <text x="0" y="30" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" textLength="100" lengthAdjust="spacingAndGlyphs">6 ennemis, 5 quêtes,</text>
      <text x="0" y="44" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" textLength="100" lengthAdjust="spacingAndGlyphs">base Electron stable</text>
    </g>
  </g>

  <!-- ═══ PHASE 2 — v0.2 (en cours) ═══ — anchor x=380 -->
  <g transform="translate(380 175)">
    <circle r="48" fill="url(#rlGlowGold)" opacity="0.9">
      <animate attributeName="r" values="44;54;44" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="24" fill="#f6d97c" stroke="#3a2412" stroke-width="2.5">
      <animate attributeName="r" values="22;28;22" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text y="7" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="20" font-weight="bold" fill="#3a2412">⚒</text>
    <!-- Title plaque (translated -60 to clear halo + eyebrow breathing room) -->
    <g transform="translate(0 -60)">
      <rect x="-90" y="-14" width="180" height="28" fill="url(#rlPlaque)" stroke="#f6d97c" stroke-width="1.5" rx="4">
        <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="2.4s" repeatCount="indefinite"/>
      </rect>
      <text x="0" y="4" text-anchor="middle" fill="#f6d97c" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold" textLength="170" lengthAdjust="spacingAndGlyphs">v0.2 — en cours</text>
      <text x="0" y="18" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="7.5" letter-spacing="1.4" textLength="48" lengthAdjust="spacingAndGlyphs">FORGE</text>
    </g>
    <g transform="translate(0 76)">
      <rect x="-80" y="0" width="160" height="56" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.9" rx="4" opacity="0.95"/>
      <text x="0" y="16" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="8" font-weight="bold" textLength="150" lengthAdjust="spacingAndGlyphs">QUATERNIUS LIVE</text>
      <text x="0" y="30" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" textLength="140" lengthAdjust="spacingAndGlyphs">Modèles réels, animations,</text>
      <text x="0" y="44" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" textLength="140" lengthAdjust="spacingAndGlyphs">audio complet, polish UI</text>
    </g>
  </g>

  <!-- ═══ PHASE 3 — v0.3 (à venir) ═══ — anchor x=650 -->
  <g transform="translate(650 175)">
    <circle r="38" fill="url(#rlGlow)" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.75;0.4" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="22" fill="#1a0838" stroke="#a07c3a" stroke-width="2.5"/>
    <text y="6" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="16" font-weight="bold" fill="#a07c3a">✦</text>
    <!-- Title plaque (translated -60, w=180) -->
    <g transform="translate(0 -60)">
      <rect x="-90" y="-14" width="180" height="28" fill="url(#rlPlaque)" stroke="#a07c3a" stroke-width="1.2" rx="4"/>
      <text x="0" y="4" text-anchor="middle" fill="#a07c3a" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold" textLength="170" lengthAdjust="spacingAndGlyphs">v0.3 — à venir</text>
      <text x="0" y="18" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="7.5" letter-spacing="1.4" textLength="62" lengthAdjust="spacingAndGlyphs">ARCANE</text>
    </g>
    <g transform="translate(0 76)">
      <rect x="-90" y="0" width="180" height="56" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.9" rx="4" opacity="0.95"/>
      <text x="0" y="16" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="8" font-weight="bold" textLength="170" lengthAdjust="spacingAndGlyphs">ARBRE DE TALENTS</text>
      <text x="0" y="30" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" textLength="160" lengthAdjust="spacingAndGlyphs">PNJ secondaires, météo</text>
      <text x="0" y="44" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" textLength="160" lengthAdjust="spacingAndGlyphs">dynamique, quêtes ramifiées</text>
    </g>
  </g>

  <!-- ═══ PHASE 4 — v1.0 (rêve) ═══ — anchor x=920 -->
  <g transform="translate(920 175)">
    <circle r="38" fill="url(#rlGlow)" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.75;0.4" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle r="22" fill="#1a0838" stroke="#a07c3a" stroke-width="2.5"/>
    <text y="6" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="18" font-weight="bold" fill="#a07c3a">⚔</text>
    <!-- Title plaque (translated -60, w=140) -->
    <g transform="translate(0 -60)">
      <rect x="-70" y="-14" width="140" height="28" fill="url(#rlPlaque)" stroke="#a07c3a" stroke-width="1.2" rx="4"/>
      <text x="0" y="4" text-anchor="middle" fill="#a07c3a" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-weight="bold" textLength="130" lengthAdjust="spacingAndGlyphs">v1.0 — rêve</text>
      <text x="0" y="18" text-anchor="middle" fill="#fff4c2" font-family="Georgia,'Times New Roman',serif" font-size="7.5" letter-spacing="1.4" textLength="64" lengthAdjust="spacingAndGlyphs">GUILDES</text>
    </g>
    <g transform="translate(0 76)">
      <rect x="-90" y="0" width="180" height="56" fill="#fff4c2" stroke="#a07c3a" stroke-width="0.9" rx="4" opacity="0.95"/>
      <text x="0" y="16" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="8" font-weight="bold" textLength="170" lengthAdjust="spacingAndGlyphs">MULTIJOUEUR COOPÉRATIF</text>
      <text x="0" y="30" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" textLength="160" lengthAdjust="spacingAndGlyphs">Guildes, raids,</text>
      <text x="0" y="44" text-anchor="middle" fill="#3a2412" font-family="Georgia,'Times New Roman',serif" font-size="7.5" font-style="italic" textLength="160" lengthAdjust="spacingAndGlyphs">commerce entre joueurs</text>
    </g>
  </g>

  <!-- ═══ PHASE 5 — + loin (éther) ═══ — anchor x=1170 -->
  <g transform="translate(1170 175)">
    <circle r="22" fill="none" stroke="#ff5468" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="20;30;20" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="10" fill="none" stroke="#ff5468" stroke-width="1" opacity="0.8"/>
    <text y="4" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="14" fill="#ff5468">∞</text>
    <!-- Title plaque (translated -60, small) -->
    <g transform="translate(0 -60)">
      <rect x="-35" y="-14" width="70" height="28" fill="#1a0838" stroke="#ff5468" stroke-width="1" rx="4" opacity="0.7"/>
      <text x="0" y="4" text-anchor="middle" fill="#ff5468" font-family="Georgia,'Times New Roman',serif" font-size="10.5" font-style="italic" textLength="62" lengthAdjust="spacingAndGlyphs">+ loin</text>
      <text x="0" y="18" text-anchor="middle" fill="#ff8598" font-family="Georgia,'Times New Roman',serif" font-size="7.5" letter-spacing="1.4" textLength="64" lengthAdjust="spacingAndGlyphs">AU-DELÀ</text>
    </g>
    <!-- Subtitle plaque (smaller, single italic line) -->
    <g transform="translate(0 76)">
      <rect x="-65" y="0" width="130" height="32" fill="#1a0838" stroke="#ff5468" stroke-width="0.8" rx="4" opacity="0.85"/>
      <text x="0" y="20" text-anchor="middle" fill="#ff8598" font-family="Georgia,'Times New Roman',serif" font-size="8.5" font-style="italic" textLength="120" lengthAdjust="spacingAndGlyphs">un horizon à inventer</text>
    </g>
  </g>

  <!-- Footer ornament line -->
  <g transform="translate(650 326)" text-anchor="middle">
    <line x1="-260" y1="0" x2="-210" y2="0" stroke="#f6d97c" stroke-width="0.6" opacity="0.5"/>
    <line x1="210" y1="0" x2="260" y2="0" stroke="#f6d97c" stroke-width="0.6" opacity="0.5"/>
    <circle cx="-275" cy="0" r="1.6" fill="#f6d97c" opacity="0.7"/>
    <circle cx="275" cy="0" r="1.6" fill="#f6d97c" opacity="0.7"/>
    <text fill="#a07c3a" font-family="Georgia,'Times New Roman',serif" font-size="9" font-style="italic" textLength="320" lengthAdjust="spacingAndGlyphs">❦ chaque phase tisse sa légende ❦</text>
  </g>
</svg>
