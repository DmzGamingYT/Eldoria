<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1064 244" xmlns="http://www.w3.org/2000/svg" width="100%" style="max-width:1064px">
  <defs>
    <!-- Shared parchment palette reused across all 5 skill cards -->
    <linearGradient id="comParch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c2"/>
      <stop offset="100%" stop-color="#d8be83"/>
    </linearGradient>
    <linearGradient id="comPlaque" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2412"/>
      <stop offset="100%" stop-color="#1a0e2e"/>
    </linearGradient>
    <!-- Element-specific radial auras -->
    <radialGradient id="sFire" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff4a0"/>
      <stop offset="50%" stop-color="#ff5722"/>
      <stop offset="100%" stop-color="#7a1c0a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sHeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="50%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#1a4a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sBolt" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff7c0"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#7a5500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sShield" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff4c2"/>
      <stop offset="60%" stop-color="#f6d97c"/>
      <stop offset="100%" stop-color="#a07c3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sFrost" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="60%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0a3a5a" stop-opacity="0"/>
    </radialGradient>
    <filter id="lyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- ==================== CARD 1 — BOULE DE FEU ==================== -->
  <g transform="translate(8 8)">
    <rect x="6" y="6" width="188" height="208" rx="10" fill="url(#comParch)" stroke="#a07c3a" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.6s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="10" width="180" height="200" rx="8" fill="none" stroke="#a07c3a" stroke-width="0.5" opacity="0.4"/>
    <!-- Flame aura -->
    <circle cx="100" cy="80" r="70" fill="url(#sFire)" opacity="0.6">
      <animate attributeName="r" values="60;75;60" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="80" r="30" fill="#ffd24a">
      <animate attributeName="r" values="28;36;28" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="100" y="92" font-size="40" text-anchor="middle">🔥</text>
    <rect x="10" y="135" width="180" height="28" fill="url(#comPlaque)" stroke="#f6d97c" stroke-width="1.5" rx="3">
      <animate attributeName="fill-opacity" values="0;1" dur="1.6s" begin="0.4s" fill="freeze"/>
    </rect>
    <text x="100" y="155" font-size="15" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" fill="#f6d97c" letter-spacing="2">❦ BOULE DE FEU ❦</text>
    <text x="100" y="170" font-size="12" text-anchor="middle" font-family="Georgia, serif" fill="#5a3a1f">♦ 15 mana</text>
    <text x="100" y="190" font-size="11" text-anchor="middle" font-family="Georgia, serif" fill="#a07c3a" font-style="italic">dégâts AoE</text>
  </g>

  <!-- ==================== CARD 2 — SOIN LÉGER ==================== -->
  <g transform="translate(220 8)">
    <rect x="6" y="6" width="188" height="208" rx="10" fill="url(#comParch)" stroke="#a07c3a" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.6s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="10" width="180" height="200" rx="8" fill="none" stroke="#a07c3a" stroke-width="0.4" opacity="0.4"/>
    <!-- Healing aura -->
    <circle cx="100" cy="80" r="60" fill="url(#sHeal)" opacity="0.7">
      <animate attributeName="r" values="50;65;50" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Pulsating cross -->
    <g transform="translate(100 80)">
      <line x1="0" y1="-32" x2="0" y2="-12" stroke="#1a4a1a" stroke-width="3">
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="12" x2="0" y2="32" stroke="#1a4a1a" stroke-width="3">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0.5s" repeatCount="indefinite"/>
      </line>
      <line x1="-32" y1="0" x2="-12" y2="0" stroke="#1a4a1a" stroke-width="3">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
      </line>
      <line x1="12" y1="0" x2="32" y2="0" stroke="#1a4a1a" stroke-width="3">
        <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </line>
      <circle r="8" fill="#a3e635">
        <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <text x="100" y="92" font-size="36" text-anchor="middle">✨</text>
    <rect x="10" y="135" width="180" height="28" fill="url(#comPlaque)" stroke="#f6d97c" stroke-width="1.5" rx="3">
      <animate attributeName="fill-opacity" values="0;1" dur="1.6s" begin="0.6s" fill="freeze"/>
    </rect>
    <text x="100" y="155" font-size="15" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" fill="#f6d97c" letter-spacing="2">❦ SOIN LÉGER ❦</text>
    <text x="100" y="170" font-size="12" text-anchor="middle" font-family="Georgia, serif" fill="#5a3a1f">♦ 20 mana</text>
    <text x="100" y="190" font-size="11" text-anchor="middle" font-family="Georgia, serif" fill="#a07c3a" font-style="italic">+50 PV instantanés</text>
  </g>

  <!-- ==================== CARD 3 — ÉCLAIR (fork-shaped bolt + sparks) ==================== -->
  <g transform="translate(432 8)">
    <rect x="6" y="6" width="188" height="208" rx="10" fill="url(#comParch)" stroke="#a07c3a" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.6s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="10" width="180" height="200" rx="8" fill="none" stroke="#a07c3a" stroke-width="0.5" opacity="0.4"/>
    <!-- Golden electric aura -->
    <circle cx="100" cy="80" r="60" fill="url(#sBolt)" opacity="0.6">
      <animate attributeName="r" values="50;68;50" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Iconic fork-shaped lightning bolt (back layer = amber, front = cream highlight) -->
    <g transform="translate(100 80)" filter="url(#lyGlow)">
      <polygon points="-6,-40 18,-6 4,-2 24,34 -18,-4 -2,-4 -22,-32"
               fill="#fbbf24" stroke="#7a5500" stroke-width="1.5" stroke-linejoin="round">
        <animate attributeName="fill-opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="-3,-30 11,-4 0,0 14,22 -10,-2 -12,-2 -14,-22"
               fill="#fff7c0" opacity="0.85"/>
    </g>
    <!-- Sparks around the bolt (animated flash sequence) -->
    <g stroke="#fde68a" stroke-width="2.5" stroke-linecap="round">
      <line x1="36" y1="48" x2="46" y2="58"><animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.2s" repeatCount="indefinite"/></line>
      <line x1="154" y1="48" x2="164" y2="58"><animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.8s" repeatCount="indefinite"/></line>
      <line x1="30" y1="105" x2="42" y2="108"><animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.4s" repeatCount="indefinite"/></line>
      <line x1="160" y1="105" x2="172" y2="108"><animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="1.0s" repeatCount="indefinite"/></line>
      <line x1="100" y1="18" x2="100" y2="26"><animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.6s" repeatCount="indefinite"/></line>
      <circle cx="40" cy="42" r="2"><animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.1s" repeatCount="indefinite"/></circle>
      <circle cx="160" cy="42" r="2"><animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0.7s" repeatCount="indefinite"/></circle>
    </g>
    <!-- Plaque (matching cards 1-2 structure) -->
    <rect x="10" y="135" width="180" height="28" fill="url(#comPlaque)" stroke="#f6d97c" stroke-width="1.5" rx="3">
      <animate attributeName="fill-opacity" values="0;1" dur="1.6s" begin="0.8s" fill="freeze"/>
    </rect>
    <text x="100" y="155" font-size="15" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" fill="#f6d97c" letter-spacing="2">❦ ÉCLAIR ❦</text>
    <text x="100" y="170" font-size="12" text-anchor="middle" font-family="Georgia, serif" fill="#5a3a1f">♦ 25 mana</text>
    <text x="100" y="190" font-size="11" text-anchor="middle" font-family="Georgia, serif" fill="#a07c3a" font-style="italic">frappe ciblée</text>
  </g>

  <!-- ==================== CARD 4 — BOUCLIER (heraldic heater shield + star emblem) ==================== -->
  <g transform="translate(644 8)">
    <rect x="6" y="6" width="188" height="208" rx="10" fill="url(#comParch)" stroke="#a07c3a" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.6s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="10" width="180" height="200" rx="8" fill="none" stroke="#a07c3a" stroke-width="0.5" opacity="0.4"/>
    <!-- Golden aura (matches parchment palette) -->
    <circle cx="100" cy="80" r="58" fill="url(#sShield)" opacity="0.5">
      <animate attributeName="r" values="50;64;50" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <!-- Heraldic heater shield (compact, centered on y=80 to match other 4 cards) -->
    <g transform="translate(100 80)">
      <path d="M0,-40 L36,-26 L36,8 Q36,28 0,48 Q-36,28 -36,8 L-36,-26 Z"
            fill="url(#comPlaque)" stroke="#f6d97c" stroke-width="2.5" stroke-linejoin="round">
        <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="2.4s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-32 L30,-20 L30,6 Q30,24 0,38 Q-30,24 -30,6 L-30,-20 Z"
            fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.7"/>
      <!-- Celtic-style cross + 4 quadrants (gold-on-dark filigree) -->
      <g stroke="#f6d97c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <line x1="0" y1="-22" x2="0" y2="22"/>
        <line x1="-22" y1="0" x2="22" y2="0"/>
        <line x1="-15" y1="-15" x2="15" y2="15" opacity="0.7"/>
        <line x1="-15" y1="15" x2="15" y2="-15" opacity="0.7"/>
      </g>
      <!-- Center boss -->
      <circle r="5" fill="#fbbf24" stroke="#7a5500" stroke-width="1.2"/>
      <circle r="2" fill="#fff7c0"/>
    </g>
    <!-- Plaque (matching cards 1-2 structure) -->
    <rect x="10" y="135" width="180" height="28" fill="url(#comPlaque)" stroke="#f6d97c" stroke-width="1.5" rx="3">
      <animate attributeName="fill-opacity" values="0;1" dur="1.6s" begin="1.0s" fill="freeze"/>
    </rect>
    <text x="100" y="155" font-size="15" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" fill="#f6d97c" letter-spacing="2">❦ BOUCLIER ❦</text>
    <text x="100" y="170" font-size="12" text-anchor="middle" font-family="Georgia, serif" fill="#5a3a1f">♦ 18 mana</text>
    <text x="100" y="190" font-size="11" text-anchor="middle" font-family="Georgia, serif" fill="#a07c3a" font-style="italic">absorbe 80 dmg</text>
  </g>

  <!-- ==================== CARD 5 — GIVRE (6-arm snowflake + crystalline crown) ==================== -->
  <g transform="translate(856 8)">
    <rect x="6" y="6" width="188" height="208" rx="10" fill="url(#comParch)" stroke="#a07c3a" stroke-width="2">
      <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3.6s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="10" width="180" height="200" rx="8" fill="none" stroke="#a07c3a" stroke-width="0.4" opacity="0.4"/>
    <!-- Glacial aura -->
    <circle cx="100" cy="80" r="60" fill="url(#sFrost)" opacity="0.7">
      <animate attributeName="r" values="55;72;55" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Crystalline 6-arm snowflake (rotates) -->
    <g transform="translate(100 80)" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <g filter="url(#lyGlow)">
        <!-- 6 main axes through origin -->
        <line x1="0" y1="-40" x2="0" y2="40" stroke="#0a3a5a" stroke-width="3"/>
        <line x1="-34.6" y1="-20" x2="34.6" y2="20" stroke="#0a3a5a" stroke-width="3"/>
        <line x1="-34.6" y1="20" x2="34.6" y2="-20" stroke="#0a3a5a" stroke-width="3"/>
        <!-- Y-branches at each tip (12 short legs total) -->
        <g stroke="#0a3a5a" stroke-width="2">
          <line x1="0" y1="-40" x2="-7" y2="-32"/><line x1="0" y1="-40" x2="7" y2="-32"/>
          <line x1="0" y1="40" x2="-7" y2="32"/><line x1="0" y1="40" x2="7" y2="32"/>
          <line x1="-34.6" y1="-20" x2="-29" y2="-12"/><line x1="-34.6" y1="-20" x2="-31" y2="-26"/>
          <line x1="34.6" y1="20" x2="29" y2="12"/><line x1="34.6" y1="20" x2="31" y2="26"/>
          <line x1="-34.6" y1="20" x2="-29" y2="28"/><line x1="-34.6" y1="20" x2="-31" y2="14"/>
          <line x1="34.6" y1="-20" x2="29" y2="-28"/><line x1="34.6" y1="-20" x2="31" y2="-14"/>
        </g>
        <!-- Inner hexagonal crown (crystalline core) -->
        <polygon points="0,-13 11.3,-6.5 11.3,6.5 0,13 -11.3,6.5 -11.3,-6.5"
                 stroke="#0a3a5a" stroke-width="1.5" fill="#fff" fill-opacity="0.85"/>
      </g>
      <!-- Center pearl -->
      <circle r="6" fill="#fff"/>
      <circle r="3" fill="#7dd3fc"/>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="14s" repeatCount="indefinite" additive="sum"/>
    </g>
    <!-- Plaque (matching cards 1-2 structure) -->
    <rect x="10" y="135" width="180" height="28" fill="url(#comPlaque)" stroke="#f6d97c" stroke-width="1.5" rx="3">
      <animate attributeName="fill-opacity" values="0;1" dur="1.6s" begin="1.2s" fill="freeze"/>
    </rect>
    <text x="100" y="155" font-size="15" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" fill="#f6d97c" letter-spacing="2">❦ GIVRE ❦</text>
    <text x="100" y="170" font-size="12" text-anchor="middle" font-family="Georgia, serif" fill="#5a3a1f">♦ 30 mana</text>
    <text x="100" y="190" font-size="11" text-anchor="middle" font-family="Georgia, serif" fill="#a07c3a" font-style="italic">ralentit &amp; gèle</text>
  </g>
</svg>
