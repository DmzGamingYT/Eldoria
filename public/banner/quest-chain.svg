<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 320" role="img" aria-label="Chaîne des quêtes d'Eldoria">
  <title>Chaîne des quêtes d'Eldoria</title>
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3a2412" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#f6d97c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a13a2a" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="questGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#fff4c2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fff4c2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bossGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#ff5468" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff5468" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>

    <symbol id="scroll" viewBox="-22 -28 44 56">
      <path d="M-20,-22 Q-22,-26 -18,-26 L18,-26 Q22,-26 20,-22 L20,22 Q22,26 18,26 L-18,26 Q-22,26 -20,22 Z"
            fill="#ead7a8" stroke="#a07c3a" stroke-width="1.5"/>
      <line x1="-14" y1="-12" x2="14" y2="-12" stroke="#3a2412" stroke-width="0.6" opacity="0.6"/>
      <line x1="-14" y1="-6"  x2="14" y2="-6"  stroke="#3a2412" stroke-width="0.6" opacity="0.6"/>
      <line x1="-14" y1="0"   x2="14" y2="0"   stroke="#3a2412" stroke-width="0.6" opacity="0.6"/>
      <line x1="-14" y1="6"   x2="14" y2="6"   stroke="#3a2412" stroke-width="0.6" opacity="0.6"/>
      <line x1="-14" y1="12"  x2="14" y2="12"  stroke="#3a2412" stroke-width="0.6" opacity="0.6"/>
      <ellipse cx="-20" cy="0" rx="4" ry="22" fill="#3a2412"/>
      <ellipse cx="20"  cy="0" rx="4" ry="22" fill="#3a2412"/>
    </symbol>
  </defs>

  <!-- Background subtle parchment strip -->
  <rect x="0" y="0" width="1300" height="320" fill="#1a0e2e" opacity="0.0"/>

  <!-- Dotted chain line gradient -->
  <line x1="120"  y1="170" x2="1180" y2="170" stroke="url(#lineGrad)" stroke-width="6"
        stroke-dasharray="2 14" stroke-linecap="round"/>

  <!-- Flowing dots along the line -->
  <g fill="#fff4c2">
    <circle cx="120" cy="170" r="6">
      <animate attributeName="cx" values="120;1180" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="170" r="4">
      <animate attributeName="cx" values="120;1180" dur="6s" begin="-2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="-2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="170" r="5">
      <animate attributeName="cx" values="120;1180" dur="6s" begin="-4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="-4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Quest 1: Chasse aux Slimes -->
  <g transform="translate(170 170)">
    <circle r="50" fill="url(#questGlow)">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <use href="#scroll" width="64" height="80" x="-32" y="-40"/>
    <text x="0" y="3" font-size="22" text-anchor="middle">🟢</text>
    <text x="0" y="55" font-size="14" text-anchor="middle" fill="#f6d97c"
          font-family="Georgia, serif" font-weight="bold">Chasse aux Slimes</text>
    <text x="0" y="73" font-size="11" text-anchor="middle" fill="#c8b5e2"
          font-family="Georgia, serif" font-style="italic">Niveau 1 ◈ 5 ennemis</text>
  </g>

  <!-- Quest 2: Menace Gobeline -->
  <g transform="translate(390 170)">
    <circle r="55" fill="url(#questGlow)">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <use href="#scroll" width="68" height="84" x="-34" y="-42"/>
    <text x="0" y="3" font-size="24" text-anchor="middle">🟤</text>
    <text x="0" y="58" font-size="14" text-anchor="middle" fill="#f6d97c"
          font-family="Georgia, serif" font-weight="bold">La Menace Gobeline</text>
    <text x="0" y="76" font-size="11" text-anchor="middle" fill="#c8b5e2"
          font-family="Georgia, serif" font-style="italic">Niveau 2 ◈ 6 ennemis</text>
  </g>

  <!-- Quest 3: Chasse aux Loups -->
  <g transform="translate(610 170)">
    <circle r="60" fill="url(#questGlow)">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <use href="#scroll" width="72" height="88" x="-36" y="-44"/>
    <text x="0" y="3" font-size="26" text-anchor="middle">🐺</text>
    <text x="0" y="62" font-size="14" text-anchor="middle" fill="#f6d97c"
          font-family="Georgia, serif" font-weight="bold">Chasse aux Loups</text>
    <text x="0" y="80" font-size="11" text-anchor="middle" fill="#c8b5e2"
          font-family="Georgia, serif" font-style="italic">Niveau 3 ◈ 5 ennemis</text>
  </g>

  <!-- Quest 4: Repos des Os -->
  <g transform="translate(830 170)">
    <circle r="62" fill="url(#questGlow)">
      <animate attributeName="opacity" values="0.4;0.95;0.4" dur="3s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <use href="#scroll" width="72" height="88" x="-36" y="-44"/>
    <text x="0" y="3" font-size="26" text-anchor="middle">💀</text>
    <text x="0" y="62" font-size="14" text-anchor="middle" fill="#f6d97c"
          font-family="Georgia, serif" font-weight="bold">Repos des Os</text>
    <text x="0" y="80" font-size="11" text-anchor="middle" fill="#c8b5e2"
          font-family="Georgia, serif" font-style="italic">Niveau 4 ◈ 6 ennemis</text>
  </g>

  <!-- Quest 5: Le Seigneur des Ombres (BOSS) -->
  <g transform="translate(1110 170)">
    <circle r="100" fill="url(#bossGlow)">
      <animate attributeName="r" values="80;110;80" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <use href="#scroll" width="84" height="104" x="-42" y="-52"/>
    <!-- Skull -->
    <g transform="translate(0 0)">
      <ellipse cx="0" cy="-2" rx="14" ry="16" fill="#1a0808" stroke="#ff3344" stroke-width="1.4"/>
      <circle cx="-5" cy="-3" r="3.5" fill="#ff3344">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="5"  cy="-3" r="3.5" fill="#ff3344">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <path d="M-3,10 L-3,15 M0,10 L0,15 M3,10 L3,15" stroke="#ff3344" stroke-width="1.2"/>
    </g>
    <text x="0" y="62" font-size="15" text-anchor="middle" fill="#ff8a96"
          font-family="Georgia, serif" font-weight="bold">Le Seigneur des Ombres</text>
    <text x="0" y="82" font-size="12" text-anchor="middle" fill="#ff5468"
          font-family="Georgia, serif" font-style="italic">⚔ Boss final ◈ Mordrak</text>
    <!-- Auras -->
    <circle r="14" fill="none" stroke="#ff3344" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" values="12;22;12" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title cartouche -->
  <g transform="translate(650 30)">
    <rect x="-220" y="-22" width="440" height="36" fill="#3a2412" stroke="#f6d97c" stroke-width="5" rx="4"/>
    <rect x="-217" y="-19" width="434" height="30" fill="none" stroke="#f6d97c" stroke-width="0.5" rx="3" opacity="0.6"/>
    <text x="0" y="6" font-size="20" text-anchor="middle" fill="#f6d97c"
          font-family="Georgia, 'Times New Roman', serif" font-weight="bold" letter-spacing="6">
      ❦ LA QUÊTE DU HÉROS ❦
    </text>
  </g>
</svg>
